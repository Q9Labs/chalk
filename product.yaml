schema_version: 1
as_of: "2026-07-22"
product: Chalk
status_semantics:
  true: "Implemented in this repository with direct code or focused-test evidence."
  false: "Missing, placeholder-only, incomplete end to end, or dependent on production proof not present in this repository."
notes:
  - "There is deliberately no partial state. Large capabilities are split into smaller checks so each result is boolean."
  - "A true result proves repository implementation, not a deployed production service, unless the item explicitly says deployment."
  - "Evidence paths are representative rather than exhaustive."

