<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="grn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5E5C0"/><stop offset="100%" stop-color="#80B879"/>
    </linearGradient>
    <linearGradient id="yel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FCEAB3"/><stop offset="100%" stop-color="#D9B641"/>
    </linearGradient>
    <linearGradient id="blu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B2E0F0"/><stop offset="100%" stop-color="#55AAC9"/>
    </linearGradient>
    <linearGradient id="pnk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8CACA"/><stop offset="100%" stop-color="#D67B7B"/>
    </linearGradient>
  </defs>
  <!-- Chalk sticks arrangement -->
  <g transform="translate(2, 2) scale(0.95)">
    <!-- Green chalk -->
    <g transform="rotate(-15 20 60)">
      <path d="M9,20 L21,20 L22,63 A7,7 0 0 1 8,63 Z" fill="url(#grn)"/>
      <ellipse cx="15" cy="20" rx="6" ry="2.5" fill="#D8ECD4"/>
    </g>

    <!-- Yellow chalk -->
    <g transform="rotate(-8 32 55)">
      <path d="M23,15 L35,15 L36,60 A7,7 0 0 1 22,60 Z" fill="url(#yel)"/>
      <ellipse cx="29" cy="15" rx="6" ry="2.5" fill="#FEF3D1"/>
    </g>

    <!-- Blue chalk -->
    <g transform="rotate(12 60 30)">
      <path d="M36,8 L48,8 L49,56 A7,7 0 0 1 35,56 Z" fill="url(#blu)"/>
      <ellipse cx="42" cy="8" rx="6" ry="2.5" fill="#D0EDF8"/>
    </g>

    <!-- Pink chalk -->
    <g transform="rotate(5 55 50)">
      <path d="M49,70 L61,70 L62,29 A7,7 0 0 0 48,29 Z" fill="url(#pnk)"/>
      <ellipse cx="55" cy="70" rx="6" ry="2.5" fill="#FBE4E4"/>
    </g>
  </g>

  <!-- "chalk" text -->
  <text x="90" y="52" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="38" font-weight="600" letter-spacing="-0.02em" fill="currentColor">chalk</text>
</svg>
