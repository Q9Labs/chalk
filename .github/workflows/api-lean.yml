name: API Lean Deploy

on:
  push:
    branches: [master]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-lean.yml'
  pull_request:
    paths:
      - 'apps/api/**'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        type: boolean
        default: false
      force_deploy:
        description: 'Force deploy'
        required: false
        type: boolean
        default: false

concurrency:
  group: api-lean-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'
  AWS_REGION: us-east-1
  ECR_REPOSITORY: chalk-prod-lean-api
  API_HEALTH_URL: https://chalk-api.q9labs.ai/health

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            go test -race ./...
          else
            go test ./...
          fi

  docker:
    name: Build & Push (arm64)
    runs-on: ubuntu-latest
    needs: test
    if: >-
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      ((github.ref == 'refs/heads/master' && github.event_name == 'push') || inputs.force_deploy)
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build metadata
        id: meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}

      - name: Output image URI
        id: image
        run: |
          echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to EC2 Lean
    runs-on: ubuntu-latest
    needs: docker
    if: >-
      always() &&
      needs.docker.result == 'success' &&
      ((github.ref == 'refs/heads/master' && github.event_name == 'push') || inputs.force_deploy)
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve target instance
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=chalk-prod-lean-api" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId | [0]' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::No running lean API instance found (tag Name=chalk-prod-lean-api)"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Restart service with new image
        id: ssm
        run: |
          CMD1="echo '${{ needs.docker.outputs.image_uri }}' | sudo tee /etc/chalk/image >/dev/null"
          CMD2="sudo systemctl restart chalk-api"
          CMD3="sudo systemctl is-active --quiet chalk-api"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Chalk API lean image ${{ github.sha }}" \
            --parameters commands="$CMD1","$CMD2","$CMD3" \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}"

          STATUS=$(aws ssm list-command-invocations \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --details \
            --query 'CommandInvocations[0].Status' \
            --output text)

          echo "SSM status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            aws ssm list-command-invocations \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --details
            exit 1
          fi

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success'
    steps:
      - name: Probe API health
        run: |
          for i in {1..15}; do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "${API_HEALTH_URL}")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Lean API healthy"
              exit 0
            fi
            echo "Attempt $i: health status $STATUS"
            sleep 8
          done
          echo "::error::Lean API health check failed"
          exit 1
