name: Cloudflare Transcription Worker

on:
  push:
    branches: [master]
    paths:
      - "infrastructure/cloudflare-worker/**"
      - ".github/workflows/cloudflare-worker.yml"
  pull_request:
    paths:
      - "infrastructure/cloudflare-worker/**"
      - ".github/workflows/cloudflare-worker.yml"
  workflow_dispatch:

concurrency:
  group: cloudflare-transcription-worker-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm --dir infrastructure/cloudflare-worker run check-types

      - name: Run tests
        run: pnpm --dir infrastructure/cloudflare-worker run test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Wrangler auth
        env:
          CLOUDFLARE_WRANGLER_OAUTH_CONFIG: ${{ secrets.CLOUDFLARE_WRANGLER_OAUTH_CONFIG }}
        run: |
          mkdir -p ~/.config/.wrangler/config
          printf '%s\n' "$CLOUDFLARE_WRANGLER_OAUTH_CONFIG" > ~/.config/.wrangler/config/default.toml

      - name: Ensure queues exist
        run: |
          pnpm --dir infrastructure/cloudflare-worker exec wrangler queues create chalk-post-meeting-transcription || true
          pnpm --dir infrastructure/cloudflare-worker exec wrangler queues create chalk-post-meeting-transcription-dlq || true

      - name: Sync worker secrets
        env:
          CHALK_TRANSCRIPTION_DISPATCH_SECRET: ${{ secrets.CHALK_TRANSCRIPTION_DISPATCH_SECRET }}
          CHALK_TRANSCRIPTION_CALLBACK_SECRET: ${{ secrets.CHALK_TRANSCRIPTION_CALLBACK_SECRET }}
        run: |
          if ! printf '%s' "$CHALK_TRANSCRIPTION_DISPATCH_SECRET" | pnpm --dir infrastructure/cloudflare-worker exec wrangler secret put CHALK_TRANSCRIPTION_DISPATCH_SECRET; then
            echo "::warning::Unable to sync CHALK_TRANSCRIPTION_DISPATCH_SECRET via CI token; retaining existing remote secret."
          fi
          if ! printf '%s' "$CHALK_TRANSCRIPTION_CALLBACK_SECRET" | pnpm --dir infrastructure/cloudflare-worker exec wrangler secret put CHALK_TRANSCRIPTION_CALLBACK_SECRET; then
            echo "::warning::Unable to sync CHALK_TRANSCRIPTION_CALLBACK_SECRET via CI token; retaining existing remote secret."
          fi

      - name: Deploy worker
        run: pnpm --dir infrastructure/cloudflare-worker run deploy
