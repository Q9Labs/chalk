name: Whisper Worker Build

on:
  push:
    branches: [master]
    paths:
      - 'infrastructure/whisper-worker/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Set up Depot CLI
        uses: depot/setup-action@v1

      - name: Build and push
        uses: depot/build-push-action@v1
        with:
          project: 2dh05v2lvk
          context: infrastructure/whisper-worker
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/chalk-prod-whisper:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/chalk-prod-whisper:latest
