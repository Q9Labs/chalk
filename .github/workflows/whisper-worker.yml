name: Whisper Worker Build

on:
  push:
    branches: [master]
    paths:
      - "infrastructure/whisper-worker/**"
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_WHISPER_REPOSITORY: chalk-prod-lean-whisper

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: infrastructure/whisper-worker
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_WHISPER_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_WHISPER_REPOSITORY }}:latest
          platforms: linux/amd64

      - name: Restart whisper worker on lean EC2 (if running)
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=chalk-prod-lean-whisper" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId | [0]' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::notice::No running whisper worker instance found (tag Name=chalk-prod-lean-whisper); skipping restart"
            exit 0
          fi

          PARAMS='{"commands":["sudo systemctl restart chalk-whisper","sudo systemctl is-active --quiet chalk-whisper"]}'
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Restart lean whisper worker after image update" \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"
