name: Web CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without changes'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Cache node_modules
        id: cache-nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-nm-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile
        timeout-minutes: 5

      - name: Build packages
        run: bun run build --filter=@q9labs/* 2>&1 | tee packages-build.log

      - name: Check packages build
        run: |
          echo "Package build completed. Checking for errors..."
          if grep -i "error" packages-build.log; then
            echo "Errors found in package build!"
          else
            echo "✓ No errors in package build"
          fi

      - name: Build web app
        run: bun run build --filter=web 2>&1 | tee build.log
        env:
          VITE_API_URL: https://chalk-api.q9labs.ai
          VITE_CHALK_API_KEY: ${{ secrets.VITE_CHALK_API_KEY }}
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Check build exit code
        if: failure()
        run: |
          echo "Build failed. Last 50 lines of build.log:"
          tail -50 build.log || cat build.log

      - name: Verify build output
        run: |
          echo "Checking build output (SPA mode)..."
          if [ -d "apps/web/dist/client" ]; then
            echo "✓ dist/client directory exists"
            du -sh apps/web/dist/client
            ls -la apps/web/dist/client/
          else
            echo "✗ dist/client NOT found"
            ls -la apps/web/dist/ || ls -la apps/web/
            exit 1
          fi

      - name: Prepare SPA for Cloudflare Pages
        run: |
          # TanStack Start SPA mode outputs _shell.html
          # Cloudflare Pages needs index.html for SPA fallback
          cd apps/web/dist/client
          cp _shell.html index.html
          # Remove _redirects - Cloudflare auto-handles SPA routing
          rm -f _redirects

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/dist/client
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/master' && github.event_name == 'push') || inputs.force_deploy
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://chalk.q9labs.ai
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: deploy-dir

      - name: List artifacts
        run: ls -la deploy-dir/

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy deploy-dir --project-name=chalk --branch=master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
