name: Web CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without changes'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build --filter=@q9labs/*

      - name: Build web app
        run: bun run build --filter=web
        env:
          VITE_API_URL: https://chalk-api.q9labs.ai

      - name: Verify build output
        run: |
          echo "Checking build output..."
          ls -la apps/web/
          if [ -d "apps/web/.output" ]; then
            echo "✓ .output directory exists"
            ls -la apps/web/.output/
          else
            echo "✗ .output directory missing!"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.output
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/master' && github.event_name == 'push') || inputs.force_deploy
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://chalk.q9labs.ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: apps/web/.output

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy .output/public --project-name=chalk-web --branch=main
