name: Web CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without changes'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  build:
    name: Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build --filter=@q9labs/* 2>&1 | tee packages-build.log

      - name: Check packages build
        run: |
          echo "Package build completed. Checking for errors..."
          if grep -i "error" packages-build.log; then
            echo "Errors found in package build!"
          else
            echo "✓ No errors in package build"
          fi

      - name: Build web app
        run: bun run build --filter=web 2>&1 | tee build.log
        env:
          VITE_API_URL: https://chalk-api.q9labs.ai

      - name: Check build exit code
        if: failure()
        run: |
          echo "Build failed. Last 50 lines of build.log:"
          tail -50 build.log || cat build.log

      - name: Verify build output
        run: |
          echo "Checking build output..."
          echo "Contents of apps/web/:"
          ls -la apps/web/ || echo "apps/web/ not found"
          echo ""
          echo "Checking for dist directory (cloudflare_pages preset):"
          if [ -d "apps/web/dist" ]; then
            echo "✓ dist directory exists"
            du -sh apps/web/dist
            ls -la apps/web/dist/
          else
            echo "✗ dist directory NOT found"
            ls -la apps/web/
          fi

      - name: Prepare artifacts
        run: |
          # Copy dist output (cloudflare_pages preset) to standard location
          mkdir -p /tmp/web-output
          cp -r apps/web/dist/* /tmp/web-output/
          echo "Contents of /tmp/web-output:"
          ls -la /tmp/web-output/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: /tmp/web-output
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    if: (github.ref == 'refs/heads/master' && github.event_name == 'push') || inputs.force_deploy
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://chalk.q9labs.ai
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-output

      - name: List artifacts
        run: ls -la web-output/

      - name: Deploy to Cloudflare Pages
        run: |
          # Create project if it doesn't exist (first deploy)
          npx wrangler@3 pages project create chalk-web --production-branch=main 2>/dev/null || true
          # Deploy full dist directory (includes _worker.js for SSR)
          npx wrangler@3 pages deploy web-output --project-name=chalk-web --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
