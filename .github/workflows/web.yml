name: Web CI/CD

on:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even without changes"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Prune monorepo for web app only
        run: |
          pnpm dlx turbo prune web
          # Copy root config files needed for builds
          cp tsconfig.json turbo.json pnpm-workspace.yaml out/
          # Fix workspaces to only include pruned packages
          cd out
          node -e "
            const pkg = require('./package.json');
            const fs = require('fs');
            pkg.workspaces = ['packages/*', 'apps/web'];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies (pruned)
        run: cd out && pnpm install --frozen-lockfile
        timeout-minutes: 3

      - name: Build packages
        run: cd out && pnpm exec turbo run build --filter=@q9labs/* 2>&1 | tee packages-build.log

      - name: Check packages build
        run: |
          echo "Package build completed. Checking for errors..."
          if grep -i "error" out/packages-build.log 2>/dev/null; then
            echo "Errors found in package build!"
          else
            echo "✓ No errors in package build"
          fi

      - name: Build web app
        run: |
          test -n "$VITE_CHALK_API_KEY"
          rm -f out/apps/web/.env.local
          cd out && pnpm exec turbo run build --filter=web 2>&1 | tee build.log
        env:
          VITE_API_URL: https://chalk-api.q9labs.ai
          VITE_PUBLIC_APP_URL: https://chalkmeet.com
          VITE_CHALK_API_KEY: ${{ secrets.VITE_CHALK_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: 520998158013-9imcfo2tk5lpis830euphcm07q8p9nr8.apps.googleusercontent.com
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Check build exit code
        if: failure()
        run: |
          echo "Build failed. Last 50 lines of build.log:"
          tail -50 out/build.log || cat out/build.log

      - name: Verify build output
        run: |
          echo "Checking build output (SPA mode)..."
          if [ -d "out/apps/web/dist/client" ]; then
            echo "✓ dist/client directory exists"
            du -sh out/apps/web/dist/client
            ls -la out/apps/web/dist/client/
          else
            echo "✗ dist/client NOT found"
            ls -la out/apps/web/dist/ || ls -la out/apps/web/
            exit 1
          fi

      - name: Prepare SPA for Cloudflare Pages
        run: |
          cd out/apps/web
          node scripts/prepare-pages-spa.mjs

      - name: Verify SPA fallback files exist
        run: |
          test -f out/apps/web/dist/client/index.html
          test -f out/apps/web/dist/client/404.html

      - name: Flatten deploy directory
        run: |
          rm -rf out/deploy
          mkdir -p out/deploy
          cp -R out/apps/web/dist/client/* out/deploy/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: out/deploy
          retention-days: 7

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/master' && github.event_name == 'push') || inputs.force_deploy
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://chalkmeet.com
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: deploy-dir

      - name: List artifacts
        run: ls -la deploy-dir/

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy deploy-dir --project-name=chalk --branch=master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
