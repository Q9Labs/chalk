name: SDK CI/CD

on:
  push:
    branches: [master]
    tags:
      - "v*"
    paths:
      - "packages/**"
      - "package.json"
      - "bun.lock"
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@q9labs'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build SDK packages
        run: bunx turbo build --filter="@q9labs/*"

      - name: Publish @q9labs/chalk-core
        run: npm publish --workspace=packages/sdk-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @q9labs/chalk-react
        run: npm publish --workspace=packages/sdk-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @q9labs/chalk-react-native
        run: npm publish --workspace=packages/sdk-react-native
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @q9labs/chalk-ui
        run: npm publish --workspace=packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @q9labs/chalk-whiteboard
        run: npm publish --workspace=packages/chalk-whiteboard
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
