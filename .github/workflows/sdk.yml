name: SDK CI/CD

on:
  push:
    branches: [master]
    tags:
      - "v*"
    paths:
      - "packages/**"
      - "package.json"
      - "bun.lock"
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Configure npm for GitHub Packages
        run: |
          echo "@q9labs:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: bun install

      - name: Build SDK packages
        run: bunx turbo build --filter="@q9labs/*"

      - name: Publish @q9labs/chalk-core
        run: |
          cd packages/sdk-core
          npm publish

      - name: Publish @q9labs/chalk-react
        run: |
          cd packages/sdk-react
          npm publish

      - name: Publish @q9labs/chalk-react-native
        run: |
          cd packages/sdk-react-native
          npm publish

      - name: Publish @q9labs/chalk-ui
        run: |
          cd packages/ui
          npm publish

      - name: Publish @q9labs/chalk-whiteboard
        run: |
          cd packages/chalk-whiteboard
          npm publish
