name: SDK CI/CD

on:
  push:
    branches: [master]
    tags:
      - "v*"
    paths:
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/**"
      - ".github/workflows/sdk.yml"
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/**"
      - ".github/workflows/sdk.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@q9labs"
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Prune monorepo for SDK packages only
        run: |
          pnpm exec turbo prune @q9labs/chalk-core @q9labs/chalk-react @q9labs/chalk-react-native @q9labs/chalk-ui @q9labs/chalk-whiteboard
          # Copy root config files needed for builds
          cp tsconfig.json turbo.json pnpm-workspace.yaml out/
          cp -R scripts out/
          # Fix workspaces to only include pruned packages
          cd out
          node -e "
            const pkg = require('./package.json');
            const fs = require('fs');
            pkg.workspaces = ['packages/*'];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies (pruned)
        run: cd out && pnpm install --frozen-lockfile
        timeout-minutes: 3

      - name: Build SDK packages
        run: cd out && pnpm exec turbo build --filter="@q9labs/*"

      - name: Publish @q9labs/chalk-core
        run: cd out/packages/sdk-core && pnpm publish --access restricted --no-git-checks

      - name: Publish @q9labs/chalk-react
        run: cd out/packages/sdk-react && pnpm publish --access restricted --no-git-checks

      - name: Publish @q9labs/chalk-react-native
        run: cd out/packages/sdk-react-native && pnpm publish --access restricted --no-git-checks

      - name: Publish @q9labs/chalk-ui
        run: cd out/packages/ui && pnpm publish --access restricted --no-git-checks

      - name: Publish @q9labs/chalk-whiteboard
        run: cd out/packages/chalk-whiteboard && pnpm publish --access restricted --no-git-checks
