name: SDK CI/CD

on:
  push:
    branches: [master]
    tags:
      - "v*"
    paths:
      - "packages/**"
      - "package.json"
      - "bun.lock"
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "bun.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@q9labs'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Prune monorepo for SDK packages only
        run: |
          bunx turbo prune @q9labs/chalk-core @q9labs/chalk-react @q9labs/chalk-react-native @q9labs/chalk-ui @q9labs/chalk-whiteboard
          # Fix workspaces to only include pruned packages
          cd out
          node -e "
            const pkg = require('./package.json');
            const fs = require('fs');
            pkg.workspaces = ['packages/*'];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies (pruned)
        run: cd out && bun install --frozen-lockfile
        timeout-minutes: 3

      - name: Build SDK packages
        run: cd out && bunx turbo build --filter="@q9labs/*"

      - name: Publish @q9labs/chalk-core
        run: cd out/packages/sdk-core && bun publish --access restricted
        continue-on-error: true

      - name: Publish @q9labs/chalk-react
        run: cd out/packages/sdk-react && bun publish --access restricted
        continue-on-error: true

      - name: Publish @q9labs/chalk-react-native
        run: cd out/packages/sdk-react-native && bun publish --access restricted
        continue-on-error: true

      - name: Publish @q9labs/chalk-ui
        run: cd out/packages/ui && bun publish --access restricted
        continue-on-error: true

      - name: Publish @q9labs/chalk-whiteboard
        run: cd out/packages/chalk-whiteboard && bun publish --access restricted
        continue-on-error: true
