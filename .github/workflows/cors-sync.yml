name: Sync CORS Origins

on:
  repository_dispatch:
    types: [cors-origins-updated]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - prod
        default: prod

concurrency:
  group: cors-sync-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: '1.9'
  AWS_REGION: us-east-1
  TF_INPUT: 'false'
  TF_IN_AUTOMATION: 'true'
  TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

permissions:
  id-token: write
  contents: read

jobs:
  sync-cors:
    name: Sync CORS Origins (Prod)
    runs-on: depot-ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin cache dir
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('infrastructure/terraform/**/*.tf') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Fetch secrets from SSM
        id: ssm
        run: |
          AXIOM_TOKEN=$(aws ssm get-parameter --name "/chalk/prod/axiom-token" --with-decryption --query "Parameter.Value" --output text)
          echo "::add-mask::$AXIOM_TOKEN"
          echo "axiom_token=$AXIOM_TOKEN" >> $GITHUB_OUTPUT

      - name: Terraform Apply (API Gateway Only)
        run: |
          terraform apply -auto-approve \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_account_id=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
            -var="axiom_token=${{ steps.ssm.outputs.axiom_token }}" \
            -target=module.api_gateway

      - name: Log CORS Sync
        run: |
          echo "## CORS Origins Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "API Gateway CORS configuration updated from S3" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
