name: Infrastructure CI/CD

on:
  push:
    branches: [master]
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/infra.yml'
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - prod
          - dev
        default: prod
      action:
        description: 'Terraform action'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      auto_approve:
        description: 'Auto-approve apply (dev only)'
        required: false
        type: boolean
        default: false

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel terraform runs

env:
  TF_VERSION: '1.9'
  AWS_REGION: us-east-1
  TF_INPUT: 'false'
  TF_IN_AUTOMATION: 'true'
  TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin cache dir
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('infrastructure/terraform/**/*.tf') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: infrastructure/terraform

      - name: Validate Modules
        run: |
          for module in vpc ecs aurora elasticache api-gateway waf monitoring ecr cloudflare; do
            echo "Validating module: $module"
            cd infrastructure/terraform/modules/$module
            terraform init -backend=false
            terraform validate
            cd -
          done

  # Production deployment
  plan-prod:
    name: Plan (Prod)
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    environment: prod
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/prod
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin cache dir
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('infrastructure/terraform/**/*.tf') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init
        continue-on-error: true

      - name: Init failed - backend not configured
        if: steps.init.outcome == 'failure'
        run: |
          echo "::error::Terraform init failed. The S3 backend may not be bootstrapped yet."
          echo "Run the bootstrap manually first:"
          echo "  cd infrastructure/terraform/bootstrap"
          echo "  terraform init && terraform apply"
          echo "Then update the backend config in environments/prod/main.tf"
          exit 1

      - name: Fetch secrets from SSM
        id: ssm
        run: |
          AXIOM_TOKEN=$(aws ssm get-parameter --name "/chalk/prod/axiom-token" --with-decryption --query "Parameter.Value" --output text)
          echo "::add-mask::$AXIOM_TOKEN"
          echo "axiom_token=$AXIOM_TOKEN" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_account_id=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
            -var="axiom_token=${{ steps.ssm.outputs.axiom_token }}" \
            -out=tfplan \
            -detailed-exitcode || echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: infrastructure/terraform/environments/prod/tfplan
          retention-days: 7
        if: always()

      - name: Plan Status
        run: |
          if [ "${{ steps.plan.outputs.exitcode }}" == "2" ]; then
            echo "::notice::Terraform plan has changes to apply"
          elif [ "${{ steps.plan.outputs.exitcode }}" == "1" ]; then
            echo "::error::Terraform plan failed"
            exit 1
          else
            echo "::notice::No changes to apply"
          fi

  apply-prod:
    name: Apply (Prod)
    runs-on: ubuntu-latest
    needs: plan-prod
    if: |
      (github.ref == 'refs/heads/master' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod' && inputs.action == 'apply')
    environment: prod-approval
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin cache dir
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('infrastructure/terraform/**/*.tf') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: infrastructure/terraform/environments/prod

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Output Infrastructure Details
        id: outputs
        run: |
          echo "## Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: \(.value.value)"' >> $GITHUB_STEP_SUMMARY

  # Development deployment
  plan-dev:
    name: Plan (Dev)
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event_name == 'workflow_dispatch' && inputs.environment == 'dev'
    environment: dev
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/dev
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin cache dir
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('infrastructure/terraform/**/*.tf') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init
        continue-on-error: true

      - name: Init failed - backend not configured
        if: steps.init.outcome == 'failure'
        run: |
          echo "::error::Terraform init failed. Run bootstrap first."
          exit 1

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="cloudflare_api_token=${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -var="cloudflare_account_id=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
            -out=tfplan \
            -detailed-exitcode || echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infrastructure/terraform/environments/dev/tfplan
          retention-days: 7

  apply-dev:
    name: Apply (Dev)
    runs-on: ubuntu-latest
    needs: plan-dev
    if: |
      github.event_name == 'workflow_dispatch' && inputs.environment == 'dev' && inputs.action == 'apply'
    environment: ${{ inputs.auto_approve && 'dev' || 'dev-approval' }}
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin cache dir
        run: mkdir -p ~/.terraform.d/plugin-cache

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('infrastructure/terraform/**/*.tf') }}
          restore-keys: terraform-${{ runner.os }}-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: infrastructure/terraform/environments/dev

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
