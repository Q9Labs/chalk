name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: Public Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package license metadata
        run: |
          set -euo pipefail
          failed=0
          while IFS= read -r manifest; do
            private="$(jq -r '.private // false' "$manifest")"
            license="$(jq -r '.license // empty' "$manifest")"
            if [[ "$private" != "true" && "$license" != "MIT" ]]; then
              echo "::error file=${manifest}::public package must declare MIT license"
              failed=1
            fi
          done < <(git ls-files '*package.json')
          exit "$failed"

      - name: Private reference scan
        run: |
          set -euo pipefail
          if git grep -n -I -E '/Users/|op://[^<][^[:space:]]+/[^[:space:]]+/|support@(q9labs\.ai|chalk\.com|chalk\.io)' -- ':!pnpm-lock.yaml' ':!.github/workflows/ci.yml'; then
            echo "::error::private operational reference found"
            exit 1
          fi

      - name: Obvious secret pattern scan
        run: |
          set -euo pipefail
          if git grep -n -I -E 'AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----|gh[pousr]_[A-Za-z0-9_]{36,}|xox[baprs]-[A-Za-z0-9-]+' -- ':!pnpm-lock.yaml' ':!apps/docs/src/content/docs/api/authentication.mdx' ':!packages/sdk-react/src/assets/sound-data.ts'; then
            echo "::error::secret-like value found"
            exit 1
          fi

  js:
    name: JavaScript and TypeScript
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build package entries
        run: |
          pnpm --filter @q9labs/chalk-whiteboard build
          pnpm --filter @q9labs/chalk-core build

      - name: Package tests
        run: |
          pnpm --filter @q9labs/chalk-core test
          pnpm --filter @q9labs/chalk-react test
          pnpm --filter @q9labs/facehash test
          pnpm --filter web test
          pnpm --filter @chalk/cloudflare-ops-monitor test
