name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "23 2 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  gate:
    name: Smart gate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.12
          cache-dependency-path: apps/api/go.sum

      - name: Setup Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: 1.19.5

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.12.3

      - name: Install Semgrep
        run: pipx install semgrep==1.166.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run smart gate
        env:
          GATE_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
          GATE_HEAD_REF: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            pnpm run gate -- --full
          else
            pnpm run gate
          fi
