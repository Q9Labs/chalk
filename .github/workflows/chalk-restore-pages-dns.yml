name: Chalk Restore Pages DNS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dns:
    name: Restore Pages DNS
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_TERRAFORM_API_TOKEN }}
      CLOUDFLARE_API_TOKEN_FALLBACK: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Upsert Pages CNAME records
        shell: bash
        run: |
          set -euo pipefail

          token="${CLOUDFLARE_API_TOKEN:-$CLOUDFLARE_API_TOKEN_FALLBACK}"
          if [[ -z "$token" ]]; then
            echo "::error::Cloudflare token secret is not configured"
            exit 1
          fi

          api() {
            local method="$1"
            local path="$2"
            shift 2
            curl -fsS \
              -X "$method" \
              -H "Authorization: Bearer $token" \
              -H "Content-Type: application/json" \
              "https://api.cloudflare.com/client/v4${path}" \
              "$@"
          }

          account_query=""
          if [[ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            account_query="?account.id=${CLOUDFLARE_ACCOUNT_ID}&per_page=50"
          fi

          zones="$(api GET "/zones${account_query:-?per_page=50}")"

          zone_id_for() {
            jq -r --arg name "$1" '.result[]? | select(.name == $name) | .id' <<<"$zones" | head -n 1
          }

          upsert_cname() {
            local zone_name="$1"
            local record_name="$2"
            local target="$3"
            local zone_id
            zone_id="$(zone_id_for "$zone_name")"

            if [[ -z "$zone_id" ]]; then
              echo "::error::zone ${zone_name} not found"
              exit 1
            fi

            local records
            records="$(api GET "/zones/${zone_id}/dns_records?per_page=200")"

            local conflicts
            conflicts="$(jq -r --arg name "$record_name" '.result[]? | select(.name == $name and (.type == "A" or .type == "AAAA" or .type == "CNAME")) | .id' <<<"$records")"

            while IFS= read -r id; do
              [[ -n "$id" ]] || continue
              api DELETE "/zones/${zone_id}/dns_records/${id}" >/dev/null
            done <<<"$conflicts"

            api POST "/zones/${zone_id}/dns_records" \
              --data "$(jq -nc --arg name "$record_name" --arg target "$target" '{type:"CNAME", name:$name, content:$target, ttl:1, proxied:true}')" \
              >/dev/null
            echo "restored CNAME ${record_name} -> ${target}"
          }

          upsert_cname "q9labs.ai" "chalk.q9labs.ai" "chalk-5bc.pages.dev"
          upsert_cname "chalkmeet.com" "chalkmeet.com" "chalk-5bc.pages.dev"
