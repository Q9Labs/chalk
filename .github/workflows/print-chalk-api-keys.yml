name: Print VITE Chalk API Key

on:
  workflow_dispatch:

jobs:
  print-key:
    name: Print VITE_CHALK_API_KEY
    runs-on: ubuntu-latest
    steps:
      - name: Echo VITE_CHALK_API_KEY
        env:
          VITE_CHALK_API_KEY: ${{ vars.VITE_CHALK_API_KEY }}
        run: |
          echo "---- VITE_CHALK_API_KEY ----"
          if [ -z "$VITE_CHALK_API_KEY" ]; then
            echo "VITE_CHALK_API_KEY is not set in repository variables"
            exit 1
          fi
          echo "$VITE_CHALK_API_KEY"
