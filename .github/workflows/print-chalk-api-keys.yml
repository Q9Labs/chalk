name: Print VITE Chalk API Key

on:
  workflow_dispatch:

jobs:
  print-key:
    name: Print VITE_CHALK_API_KEY
    runs-on: ubuntu-latest
    steps:
      - name: Print VITE_CHALK_API_KEY (base64)
        env:
          VITE_CHALK_API_KEY: ${{ secrets.VITE_CHALK_API_KEY }}
        run: |
          if [ -z "$VITE_CHALK_API_KEY" ]; then
            echo "VITE_CHALK_API_KEY is not set in repository secrets"
            exit 1
          fi

          echo "---- VITE_CHALK_API_KEY (base64) ----"
          echo "$VITE_CHALK_API_KEY" | base64
          echo "Decode with: echo '<output>' | base64 --decode"

