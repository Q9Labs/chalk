&lt;div id=&quot;chalk-control-room&quot;&gt;
  &lt;style&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&quot;chalk-control-room&quot;);
      const streams = [
        {
          id: &quot;sync&quot;,
          name: &quot;Sync v2 → v3&quot;,
          verdict: &quot;Strong local proof; no launch proof&quot;,
          goal: &quot;Move conference authority to durable Postgres-backed declarative sync with bounded recovery and provider-neutral operations.&quot;,
          states: [&quot;done&quot;, &quot;done&quot;, &quot;partial&quot;, &quot;partial&quot;, &quot;missing&quot;],
          known: [&quot;V2 recorded a 201-test gate and 100,000-operation replay campaign.&quot;, &quot;V3 recorded green API and Sync gates plus Chromium and Node recovery to revision 2.&quot;, &quot;V2 runtime and schema surfaces were structurally removed.&quot;],
          missing: [&quot;The current root quality contract is red.&quot;, &quot;No staging provider canary or production proof exists.&quot;, &quot;Earlier production blockers included token integration, standby/PITR, populated migration, and soak approval.&quot;],
          source: &quot;Sync readiness report + v3 implementation logs&quot;
        },
        {
          id: &quot;observability&quot;,
          name: &quot;Observability + status&quot;,
          verdict: &quot;Telemetry exists; status platform incomplete&quot;,
          goal: &quot;Carry journey and W3C trace context end to end, then project independent public-safe uptime and incidents.&quot;,
          states: [&quot;done&quot;, &quot;done&quot;, &quot;partial&quot;, &quot;missing&quot;, &quot;missing&quot;],
          known: [&quot;Journey telemetry is merged across API, Sync, clients, mobile/web, and observability infrastructure.&quot;, &quot;Focused logs record full API/Sync gates and 102 client telemetry tests.&quot;],
          missing: [&quot;Independent monitors, signed intake, sanitized status projection, alerts, and recovery drills are not proven.&quot;, &quot;The no-apply infrastructure implementation is active and uncommitted.&quot;],
          source: &quot;Observability spec + telemetry session logs&quot;
        },
        {
          id: &quot;sdk&quot;,
          name: &quot;SDK + React Native&quot;,
          verdict: &quot;Locally proven; device/provider proof absent&quot;,
          goal: &quot;Make sync and telemetry Effect-native, remove component lifecycle ownership, and isolate media behind a vendor-neutral port.&quot;,
          states: [&quot;done&quot;, &quot;done&quot;, &quot;partial&quot;, &quot;partial&quot;, &quot;missing&quot;],
          known: [&quot;Recorded RN gate: formatting, types, 39 files / 146 tests, and build all green.&quot;, &quot;V3 client coverage reached 149 tests with executable browser and Node recovery.&quot;, &quot;Vendor-neutral media-plane contracts are merged.&quot;],
          missing: [&quot;The monorepo quality contract is currently red.&quot;, &quot;No real device plus provider-backed media proof is recorded.&quot;, &quot;One media-plane commit interleaved unrelated sync-token artifacts, weakening rollback isolation.&quot;],
          source: &quot;RN refactor + v3 SDK logs&quot;
        },
        {
          id: &quot;recorder&quot;,
          name: &quot;Recorder&quot;,
          verdict: &quot;Foundation only; not a usable service&quot;,
          goal: &quot;Provide bounded reservation, fenced jobs, encrypted capture bundles, deterministic render, health, and SDK contracts.&quot;,
          states: [&quot;done&quot;, &quot;done&quot;, &quot;partial&quot;, &quot;missing&quot;, &quot;missing&quot;],
          known: [&quot;Recorder-focused proof and API gate are recorded green.&quot;, &quot;A real 10-second H.264/AAC 1280×720 encrypted capture-to-render fixture passed.&quot;, &quot;The merged foundation includes durable control-plane and object-storage contracts.&quot;],
          missing: [&quot;Capture and render executables are fixture-only.&quot;, &quot;Provider join, claim loops, R2/GPU execution, terminal reporting, extension admission, and pool-health authority are absent.&quot;, &quot;Three unique side-branch commits overlap 59 master files and need semantic reconciliation.&quot;],
          source: &quot;Recorder pipeline debrief + side-branch audit&quot;
        },
        {
          id: &quot;transcription&quot;,
          name: &quot;Transcription&quot;,
          verdict: &quot;Local artifact pipeline; staging blocked&quot;,
          goal: &quot;Move transcription into a fenced private-artifact pipeline with bounded provider orchestration and cleanup.&quot;,
          states: [&quot;done&quot;, &quot;done&quot;, &quot;missing&quot;, &quot;missing&quot;, &quot;missing&quot;],
          known: [&quot;Fresh migration cycles, API lifecycle, dispatcher tests, 12,000-cue normalization, and reproducible release builds are recorded.&quot;, &quot;Both OpenTofu modules validated locally.&quot;],
          missing: [&quot;Recorder-to-transcription handoff is not transactional and production capture cannot supply it.&quot;, &quot;DeepInfra qualification and live AWS/R2 failure recovery are absent.&quot;, &quot;The canonical monorepo gate was explicitly not green.&quot;],
          source: &quot;Transcription execution ledger + debrief&quot;
        },
        {
          id: &quot;webhooks&quot;,
          name: &quot;Outbound webhooks&quot;,
          verdict: &quot;Six-of-eight live path; launch blocked&quot;,
          goal: &quot;Ship durable signed webhook delivery, retries, typed receivers, authoritative producers, and journey-linked operations.&quot;,
          states: [&quot;done&quot;, &quot;done&quot;, &quot;missing&quot;, &quot;partial&quot;, &quot;missing&quot;],
          known: [&quot;Durable outbox, management API, dispatcher, SDK receiver helpers, and Sync producers are merged.&quot;, &quot;Focused PostgreSQL and receiver proofs passed; live delivery reached six of eight core events.&quot;],
          missing: [&quot;Participant-left and session-ended were never re-proven through the webhook canary.&quot;, &quot;Production KMS custody, erase/restore orchestration, and launch-load fairness remain unproven.&quot;, &quot;The canonical gate is red.&quot;],
          source: &quot;Outbound webhooks debrief + canary log&quot;
        },
        {
          id: &quot;media&quot;,
          name: &quot;API + media plane&quot;,
          verdict: &quot;Contracts wired; provider execution incomplete&quot;,
          goal: &quot;Connect API and Sync to a private provider-neutral media operation boundary with durable receipts and observations.&quot;,
          states: [&quot;done&quot;, &quot;done&quot;, &quot;partial&quot;, &quot;missing&quot;, &quot;missing&quot;],
          known: [&quot;Provider registry, operation bridge, mTLS fake-provider proof, migrations, API/Sync gates, and generated contracts are recorded.&quot;, &quot;Cross-runtime fake-provider execution was observed exactly once in focused proof.&quot;],
          missing: [&quot;Private listener composition, readiness, Cloudflare mapping, publication grants, provider removal, and recording operations remain absent.&quot;, &quot;No real provider or staging proof exists.&quot;],
          source: &quot;Media-plane + provider bridge logs&quot;
        },
        {
          id: &quot;infra&quot;,
          name: &quot;Infrastructure M0–M2&quot;,
          verdict: &quot;Active, uncommitted, no-apply&quot;,
          goal: &quot;Build staging runtime, immutable release, OpenTofu, managed monitoring/status, secrets, policy, and cost controls without applying resources.&quot;,
          states: [&quot;active&quot;, &quot;active&quot;, &quot;missing&quot;, &quot;missing&quot;, &quot;missing&quot;],
          known: [&quot;A separate worktree contains 3 modified and 137 untracked files across the declared M0–M2 lanes.&quot;, &quot;Two background implementation workers were active at the audit snapshot.&quot;, &quot;Worker briefs explicitly prohibit provider mutation, staging apply, and production.&quot;],
          missing: [&quot;The work is not committed or integrated.&quot;, &quot;No root gate or independent top-level acceptance has completed.&quot;, &quot;M0–M5, clean staging plans, state recovery, live staging, restore drills, and production remain unproven.&quot;],
          source: &quot;Infra worktree + active worker records&quot;
        }
      ];

      const stateLabel = { done: &quot;Recorded&quot;, partial: &quot;Partial&quot;, active: &quot;Active&quot;, missing: &quot;Missing&quot; };
      const columnLabel = [&quot;Code&quot;, &quot;Focused&quot;, &quot;Root gate&quot;, &quot;Live&quot;, &quot;Production&quot;];
      const matrix = root.querySelector(&quot;#evidence-matrix&quot;);
      const detailTitle = root.querySelector(&quot;#detail-title&quot;);
      const detailVerdict = root.querySelector(&quot;#detail-verdict&quot;);
      const detailGoal = root.querySelector(&quot;#detail-goal&quot;);
      const detailKnown = root.querySelector(&quot;#detail-known&quot;);
      const detailMissing = root.querySelector(&quot;#detail-missing&quot;);
      const detailSource = root.querySelector(&quot;#detail-source&quot;);
      let selected = streams[0];

      function renderRows() {
        streams.forEach((stream) =&gt; {
          const row = document.createElement(&quot;div&quot;);
          row.className = &quot;matrix-row&quot;;
          row.setAttribute(&quot;role&quot;, &quot;row&quot;);

          const button = document.createElement(&quot;button&quot;);
          button.type = &quot;button&quot;;
          button.className = &quot;btn stream-btn&quot;;
          button.textContent = stream.name;
          button.setAttribute(&quot;aria-pressed&quot;, stream === selected ? &quot;true&quot; : &quot;false&quot;);
          button.addEventListener(&quot;click&quot;, () =&gt; selectStream(stream));
          row.appendChild(button);

          stream.states.forEach((state, index) =&gt; {
            const cell = document.createElement(&quot;span&quot;);
            cell.className = `state-cell state-${state} text-small`;
            cell.setAttribute(&quot;role&quot;, &quot;cell&quot;);
            cell.dataset.label = columnLabel[index];
            cell.textContent = stateLabel[state];
            row.appendChild(cell);
          });
          matrix.appendChild(row);
        });
      }

      function selectStream(stream) {
        selected = stream;
        root.querySelectorAll(&quot;.stream-btn&quot;).forEach((button) =&gt; {
          button.setAttribute(&quot;aria-pressed&quot;, button.textContent === stream.name ? &quot;true&quot; : &quot;false&quot;);
        });
        detailTitle.textContent = stream.name;
        detailVerdict.textContent = stream.verdict;
        detailGoal.textContent = stream.goal;
        detailKnown.innerHTML = stream.known.map((item) =&gt; `&lt;li&gt;${item}&lt;/li&gt;`).join(&quot;&quot;);
        detailMissing.innerHTML = stream.missing.map((item) =&gt; `&lt;li&gt;${item}&lt;/li&gt;`).join(&quot;&quot;);
        detailSource.textContent = stream.source;
      }

      const explainButton = root.querySelector(&quot;#explain-stream&quot;);
      if (!window.openai?.sendFollowUpMessage) explainButton.textContent = &quot;Copy explanation prompt&quot;;
      explainButton.addEventListener(&quot;click&quot;, async () =&gt; {
        const prompt = `Explain the ${selected.name} work from Chalk&#x27;s July 12–14 audit in plain language. Give me: what changed, why it matters, what was actually verified, what is still unknown, and the one safest next decision. Keep it under 500 words and do not implement anything.`;
        if (window.openai?.sendFollowUpMessage) {
          await window.openai.sendFollowUpMessage({ title: `Explain ${selected.name}`, prompt });
          return;
        }
        await navigator.clipboard.writeText(prompt);
        explainButton.textContent = &quot;Prompt copied&quot;;
      });

      renderRows();
      selectStream(selected);
    })();
  &lt;/script&gt;

  const tooltipId = `codex-visualization-tooltip-${
