&lt;div id="recorder-contract-map"&gt;
  &lt;style&gt;
    #recorder-contract-map {
      display: grid;
      gap: 1.25rem;

    }

    #recorder-contract-map .rcm-section {
      display: grid;
      gap: 0.75rem;
    }

      color: var(--muted-foreground);

    }

      gap: 1rem;
    }

      gap: 0.25rem;
    }

      font-weight: 500;

      gap: 1rem;

      gap: 0.25rem;

      align-items: center;
      gap: 0.6rem;

      display: grid;
      min-height: 5.5rem;
      place-content: center;
      gap: 0.25rem;
      padding: 0.85rem;
      border: 1px solid transparent;
      border-radius: 0.75rem;
      background: color-mix(in srgb, var(--muted) 58%, transparent);
      text-align: center;
      transition:
        background-color 160ms ease,
        border-color 160ms ease,
        transform 160ms ease;
    }

    #recorder-contract-map .rcm-node strong {

    }

    #recorder-contract-map .rcm-node span {
      color: var(--muted-foreground);
    }

    #recorder-contract-map .rcm-node.is-active {
      border-color: color-mix(in srgb, var(--viz-series-1) 65%, transparent);
      background: color-mix(in srgb, var(--viz-series-1) 18%, var(--card));
      transform: translateY(-2px);

    #recorder-contract-map .rcm-arrow {
      color: var(--muted-foreground);

    #recorder-contract-map .rcm-arrow.is-active {
      color: var(--foreground);
    }

    #recorder-contract-map .rcm-media-row {

      grid-template-columns: repeat(4, minmax(0, 1fr));

      align-content: start;
      gap: 0.45rem;

      background: color-mix(in srgb, var(--muted) 35%, transparent);

      font-weight: 500;

  &lt;section class="rcm-section" aria-labelledby="rcm-contract-label"&gt;

        &lt;div class="rcm-fact"&gt;
          &lt;span&gt;Control plane owns&lt;/span&gt;

        &lt;/div&gt;
        &lt;div class="rcm-fact"&gt;
          &lt;span&gt;Worker receives&lt;/span&gt;
          &lt;strong id="rcm-worker-receives"&gt;Node identity, then one fenced job lease&lt;/strong&gt;

        &lt;div class="rcm-fact"&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById("recorder-contract-map");
      const contracts = {
        identity: {
          title: "Only a current Chalk recorder may claim work",
          summary: "A short-lived node certificate proves the machine and role; a narrower lease proves the job.",
          owns: "Bootstrap nonce, certificate issuance, revocation",
          receives: "Node identity, then one fenced job lease",
          prevents: "An old or copied machine taking new recordings",
          nodes: ["control", "job", "capture", "render"],
          edges: ["contract"],
        },
        assignment: {
          title: "Every worker receives one complete, immutable job",
          summary: "The assignment pins the meeting, participants, layout, attempt, deadline, inputs, outputs, and trace context.",
          owns: "Job state, attempt number, deadline, participant map",
          receives: "Everything required to finish without guessing",
          prevents: "Two agents inventing incompatible job shapes",
          nodes: ["meeting", "control", "job", "capture", "render"],
          edges: ["admission", "contract"],
        },
        storage: {
          title: "Workers may use objects, but they never choose ownership",
          summary: "The API selects every key and grants one-operation URLs plus only the recording key needed for that attempt.",
          owns: "Tenant, object key, conditions, size, encryption authority",
          receives: "Expiring GET or conditional-create PUT grants",
          prevents: "Cross-tenant writes, overwrites, reusable credentials",
          nodes: ["control", "job", "capture", "render"],
          edges: ["contract", "bundles"],
        },
        events: {
          title: "Progress cannot extend authority or hide a dead worker",
          summary: "Workers report bounded events every 15 seconds; after 45 seconds the attempt is fenced before replacement.",
          owns: "Lease transitions, retries, dead letter, replacement",
          receives: "Heartbeat, progress, gap, and terminal event schemas",
          prevents: "Overlapping attempts and silent recording loss",
          nodes: ["control", "job", "capture", "render", "qualification"],
          edges: ["contract", "bundles", "artifact"],
        },
        finalize: {
          title: "One transaction makes the result permanent exactly once",
          summary: "The control plane verifies immutable object facts, commits the artifact, registers every transcription chunk, and creates their jobs together.",
          owns: "Artifact commit and complete transcription handoff",
          receives: "Verified facts, manifests, and terminal result",
          prevents: "Playable video without transcript work, or duplicate jobs",
          nodes: ["control", "render", "qualification"],
          edges: ["artifact"],
        },
      };

      const fields = {
        title: root.querySelector("#rcm-contract-title"),
        summary: root.querySelector("#rcm-contract-summary"),
        owns: root.querySelector("#rcm-control-owns"),
        receives: root.querySelector("#rcm-worker-receives"),
        prevents: root.querySelector("#rcm-prevents"),
      };

      function selectContract(name) {
        const contract = contracts[name];
        if (!contract) return;

        fields.title.textContent = contract.title;
        fields.summary.textContent = contract.summary;
        fields.owns.textContent = contract.owns;
        fields.receives.textContent = contract.receives;
        fields.prevents.textContent = contract.prevents;

        root.querySelectorAll("[data-contract]").forEach((button) =&gt; {
          const active = button.dataset.contract === name;
          button.classList.toggle("btn-primary", active);
          button.setAttribute("aria-pressed", String(active));
        });

        root.querySelectorAll("[data-node]").forEach((node) =&gt; {
          node.classList.toggle("is-active", contract.nodes.includes(node.dataset.node));
        });

        root.querySelectorAll("[data-edge]").forEach((edge) =&gt; {
          edge.classList.toggle("is-active", contract.edges.includes(edge.dataset.edge));
        });
      }

      root.querySelectorAll("[data-contract]").forEach((button) =&gt; {
        button.addEventListener("click", () =&gt; selectContract(button.dataset.contract));
      });
    })();
  &lt;/script&gt;

&lt;script src="https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js"&gt;&lt;/script&gt;
&lt;script src="https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js"&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set(["top", "right", "bottom", "left"]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest("[data-tooltip]")
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute("data-tooltip")?.trim() ?? "";
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute("data-tooltip-placement");
    return tooltipPlacements.has(placement) ? placement : "top";
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement("div");
      tooltip.id = tooltipId;
      tooltip.className = "tooltip";
      tooltip.setAttribute("role", "tooltip");
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute("aria-describedby") ?? "")
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute("aria-describedby");
    } else {
      trigger.setAttribute("aria-describedby", [...ids].join(" "));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              "--tooltip-available-width",
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              "--tooltip-available-height",
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: "fixed",
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = "visible";
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = "hidden";
    floating.style.transform = "translate(0, 0)";
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === "touch") {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(":focus-visible")) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === "Escape") {
      closeTooltip();
