<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none">
  <!-- Rounded rectangle container - black -->
  <rect width="72" height="72" rx="14" fill="black"/>

  <!-- Q outer shape - white -->
  <ellipse cx="32" cy="34" rx="18" ry="18" fill="white"/>
  <!-- Q inner hole - black cutout -->
  <ellipse cx="32" cy="34" rx="9" ry="9" fill="black"/>

  <!-- Q tail - diagonal stroke -->
  <rect x="40" y="44" width="22" height="9" rx="2" transform="rotate(45 40 44)" fill="white"/>

  <!-- Superscript 9 -->
  <text x="50" y="26" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="white">9</text>

  <!-- Labs text - black for light backgrounds -->
  <text x="88" y="48" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="34" font-weight="500" letter-spacing="-0.02em" fill="black">Labs</text>
</svg>
