openapi: 3.0.3
info:
  title: Chalk API
  description: |
    Ultra low-latency, low-bandwidth optimized, real-time video conferencing platform
    built on Cloudflare RealtimeKit.

    **Primary Use Case:** Education (virtual classrooms, tutoring, lectures)
  version: 1.0.0
  contact:
    name: Chalk Support
    email: support@example.com
  license:
    name: Private
    url: https://chalk.io/terms
servers:
  - url: https://api.chalk.io
    description: Production
  - url: https://api.staging.chalk.io
    description: Staging
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
    description: Authentication and token management
  - name: Debug
    description: Debug and diagnostics endpoints for client support tooling
  - name: Tenants
    description: Tenant (organization) management
  - name: Rooms
    description: Video conferencing room management
  - name: Participants
    description: Room participant management
  - name: Recordings
    description: Recording management and storage
  - name: Webhooks
    description: Webhook handlers for external services
  - name: Admin
    description: Administrative endpoints secured with admin secret.
  - name: Ops
    description: Operational status and incident management endpoints.
  - name: Internal
    description: Internal first-party auth/dashboard endpoints.
  - name: Transcription
    description: Post-meeting transcription endpoints.
  - name: WebSocket
    description: WebSocket handshake endpoint.
  - name: WhatsNew
    description: Release notes endpoints.
security:
  - BearerAuth: []
paths:
  /api/v1/admin/audit-logs:
    get:
      summary: List Audit Logs
      tags:
        - Admin
      security:
        - AdminSecretAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of items to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          required: false
          description: Number of items to skip
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpaqueObjectArray"
        "500":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/admin/ops/incidents:
    get:
      summary: List Ops Incidents
      tags:
        - Admin
        - Ops
