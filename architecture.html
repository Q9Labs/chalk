<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Interactive atlas of Chalk's product, runtime, data, and operational architecture." />
    <title>Chalk — System Architecture Atlas</title>
    <link rel="icon" href="./apps/web/public/favicon.ico" />
    <style>
      :root {
        color-scheme: light;
        --paper: #e9e4d8;
        --paper-2: #efeade;
        --surface: #fbfaf6;
        --surface-bright: #fff;
        --board: #26382f;
        --board-deep: #1e2d26;
        --ink: #20281f;
        --ink-2: #5a6355;
        --ink-3: #8b9184;
        --line: #d7d1c1;
        --line-strong: #bdb5a0;
        --accent: #3e7647;
        --accent-strong: #335f3b;
        --accent-wash: #e6f0e3;
        --green: #8fbf87;
        --yellow: #d8b94f;
        --blue: #67b0cb;
        --pink: #cf8585;
        --violet: #9488c2;
        --planned-bg: #e4dfd3;
        --planned-ink: #777a70;
        --planned-line: #aaa493;
        --edge: #9aa094;
        --edge-hot: #4b8656;
        --header: rgb(251 250 246/0.9);
        --dot: rgb(38 56 47/0.11);
        --shadow: 0 1px 2px rgb(46 52 38/0.06), 0 8px 24px rgb(46 52 38/0.07);
        --shadow-lg: 0 4px 10px rgb(46 52 38/0.08), 0 24px 52px rgb(46 52 38/0.14);
        --font: "Figtree", "Avenir Next", Avenir, system-ui, sans-serif;
        --display: "Bricolage Grotesque", "Avenir Next", Avenir, system-ui, sans-serif;
        --mono: "Spline Sans Mono", "SFMono-Regular", Consolas, monospace;
      }
      .dark {
        color-scheme: dark;
        --paper: #17221c;
        --paper-2: #1d2b23;
        --surface: #25362c;
        --surface-bright: #2a3d32;
        --board: #101913;
        --board-deep: #0c120e;
        --ink: #f3f0e7;
        --ink-2: #c1c8bd;
        --ink-3: #89948a;
        --line: #3a4d40;
        --line-strong: #526759;
        --accent: #91c48e;
        --accent-strong: #b3d9ae;
        --accent-wash: #2b4533;
        --green: #9acb94;
        --yellow: #e6c968;
        --blue: #79c2dc;
        --pink: #e4a1a1;
        --violet: #b2a7df;
        --planned-bg: #202d25;
        --planned-ink: #8e9b90;
        --planned-line: #536057;
        --edge: #647369;
        --edge-hot: #93c790;
        --header: rgb(23 34 28/0.9);
        --dot: rgb(235 240 231/0.08);
        --shadow: 0 1px 2px rgb(0 0 0/0.25), 0 8px 24px rgb(0 0 0/0.18);
        --shadow-lg: 0 24px 52px rgb(0 0 0/0.3);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        transition:
          background 0.2s,
          color 0.2s;
      }
      button,
      input {
        font: inherit;
      }
      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      #backdrop {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: var(--paper);
      }
      #backdrop::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(var(--dot) 1px, transparent 1.2px);
        background-size: 24px 24px;
        mask-image: radial-gradient(ellipse 100% 90% at 50% 46%, #000 36%, transparent 100%);
      }
      #backdrop::after {
        content: "";
        position: absolute;
        inset: 66px 0 0;
        opacity: 0.28;
        background: linear-gradient(105deg, transparent 48%, color-mix(in srgb, var(--green) 12%, transparent), transparent 54%);
        transform: translateX(-28%);
      }
      header {
        position: fixed;
        inset: 0 0 auto;
        height: 66px;
        z-index: 40;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        background: var(--header);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(14px);
      }
      #brand {
        align-self: stretch;
        margin-left: -16px;
        padding: 0 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 0;
        background: var(--board-deep);
        color: #fff;
        cursor: pointer;
        flex: 0 0 auto;
      }
      #brand img {
        width: 92px;
        max-height: 32px;
        filter: brightness(0) invert(1);
      }
      #brand span {
        font-size: 9px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgb(255 255 255/0.62);
        white-space: nowrap;
      }
      #tabs {
        display: flex;
        align-items: center;
        gap: 3px;
        padding: 3px;
        background: var(--paper-2);
        border: 1px solid var(--line);
        border-radius: 11px;
        flex: 0 0 auto;
      }
      #tabs button {
        border: 0;
        background: transparent;
        color: var(--ink-2);
        padding: 6px 11px;
        border-radius: 8px;
        font-size: 11.5px;
        font-weight: 700;
        cursor: pointer;
      }
      #tabs button.on {
        background: var(--surface);
        color: var(--ink);
        box-shadow: 0 1px 4px rgb(46 52 38/0.09);
      }
      #crumbs {
        display: flex;
        align-items: center;
        gap: 5px;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        color: var(--ink-2);
        font-size: 12px;
      }
      .crumb {
        border: 1px solid transparent;
        background: transparent;
        color: inherit;
        padding: 5px 7px;
        border-radius: 8px;
        cursor: pointer;
        white-space: nowrap;
      }
      .crumb:hover {
        background: var(--paper-2);
        border-color: var(--line);
      }
      .crumb.here {
        color: var(--accent-strong);
        background: var(--accent-wash);
        border-color: color-mix(in srgb, var(--accent) 30%, transparent);
        cursor: default;
      }
      .sep {
        color: var(--ink-3);
      }
      #level {
        margin-left: auto;
        flex: 0 0 auto;
        font-family: var(--mono);
        font-size: 9.5px;
        letter-spacing: 0.08em;
        color: var(--accent-strong);
        background: var(--accent-wash);
        border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
        border-radius: 99px;
        padding: 5px 9px;
      }
      .hbtn {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: transparent;
        color: var(--ink-2);
        font-size: 11.5px;
        padding: 7px 10px;
        cursor: pointer;
      }
      .hbtn:hover {
        color: var(--ink);
        border-color: var(--line-strong);
      }
      .hbtn kbd {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--ink-3);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 1px 4px;
      }
      #stage {
        position: fixed;
        inset: 66px 0 0;
        overflow: hidden;
        cursor: grab;
        perspective: 1800px;
        user-select: none;
        touch-action: none;
      }
      #stage.dragging {
        cursor: grabbing;
      }
      #tilt {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        transition: transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
      }
      #stage.tilted #tilt {
        transform: rotateX(16deg) scale(0.96);
      }
      #viewport {
        position: absolute;
        inset: 0 auto auto 0;
        transform-origin: 0 0;
        will-change: transform;
      }
      #world {
        position: relative;
      }
      #world > svg {
        position: absolute;
        inset: 0 auto auto 0;
        overflow: visible;
      }
      .edge {
        fill: none;
        stroke: var(--edge);
        stroke-width: 1.45;
      }
      .edge.hot {
        stroke: var(--edge-hot);
        stroke-width: 1.8;
      }
      .edge.dashed {
        stroke-dasharray: 5 7;
        animation: dash 30s linear infinite;
      }
      .edge.planned {
        stroke: var(--planned-line);
        stroke-dasharray: 3 7;
        animation: none;
        opacity: 0.7;
      }
      .edge.flow {
        stroke-dasharray: 7 7;
        animation: dash 20s linear infinite;
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -700;
        }
      }
      .edge-label {
        font: 10.5px var(--font);
        fill: var(--ink-2);
        paint-order: stroke;
        stroke: var(--paper);
        stroke-width: 5px;
        stroke-linejoin: round;
      }
      .zone-bg {
        fill: color-mix(in srgb, var(--surface) 45%, transparent);
        stroke: var(--line);
        stroke-dasharray: 3 6;
      }
      .zone-label {
        font: 700 10px var(--font);
        letter-spacing: 0.15em;
        fill: var(--ink-3);
      }
      .lane-bg {
        fill: color-mix(in srgb, var(--surface) 50%, transparent);
        stroke: var(--line);
      }
      .arrow {
        stroke: var(--edge);
      }
      .arrow-hot {
        stroke: var(--edge-hot);
      }
      .node {
        position: absolute;
        border-radius: 15px;
        background: var(--surface);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        padding: 15px 16px;
        cursor: pointer;
        transition:
          transform 0.16s,
          border-color 0.16s,
          box-shadow 0.16s;
        animation: rise 0.42s cubic-bezier(0.16, 1, 0.3, 1) both;
        overflow: visible;
      }
      .node[role="button"]:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--accent) 70%, transparent);
        outline-offset: 4px;
      }
      .node::after {
        content: "";
        position: absolute;
        inset: 0 auto auto 14px;
        width: 46px;
        height: 3px;
        background: var(--node-color, var(--green));
        border-radius: 0 0 4px 4px;
        opacity: 0.9;
      }
      .node:hover {
        transform: translateY(-2px);
        border-color: var(--line-strong);
        box-shadow: var(--shadow-lg);
      }
      .node.core {
        border-color: color-mix(in srgb, var(--accent) 50%, var(--line));
        background: linear-gradient(150deg, var(--accent-wash), var(--surface) 68%);
        box-shadow: var(--shadow-lg);
      }
      .node.context {
        background: color-mix(in srgb, var(--paper-2) 72%, var(--surface));
        border-style: dotted;
        cursor: default;
      }
      .node.context:hover,
      .node.headcard:hover {
        transform: none;
        box-shadow: var(--shadow);
      }
      .node.partial {
        background: linear-gradient(135deg, var(--surface) 0 83%, color-mix(in srgb, var(--yellow) 18%, var(--surface)) 83%);
      }
      .node.planned {
        color: var(--planned-ink);
        background: repeating-linear-gradient(135deg, var(--planned-bg) 0 9px, color-mix(in srgb, var(--planned-bg) 84%, var(--surface)) 9px 18px);
        border-color: var(--planned-line);
        border-style: dashed;
        box-shadow: none;
      }
      .node.planned::after {
        background: var(--planned-line);
      }
      .status {
        position: absolute;
        top: -9px;
        right: 10px;
        font: 750 8.5px var(--mono);
        letter-spacing: 0.08em;
        padding: 3px 7px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        background: var(--surface);
        color: var(--ink-2);
        z-index: 2;
      }
      .partial > .status {
        color: color-mix(in srgb, var(--yellow) 70%, var(--ink));
        border-color: color-mix(in srgb, var(--yellow) 70%, var(--line));
      }
      .planned > .status {
        color: var(--planned-ink);
        border-color: var(--planned-line);
        background: var(--planned-bg);
      }
      .node .head {
        display: flex;
        align-items: center;
        gap: 11px;
      }
      .node .icon {
        width: 35px;
        height: 35px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        color: color-mix(in srgb, var(--node-color, var(--green)) 70%, var(--ink));
        background: color-mix(in srgb, var(--node-color, var(--green)) 16%, transparent);
        border: 1px solid color-mix(in srgb, var(--node-color, var(--green)) 36%, transparent);
      }
      .node svg {
        display: block;
        max-width: none;
      }
      .node h3 {
        font: 650 14px/1.18 var(--display);
        letter-spacing: -0.015em;
      }
      .node .tag {
        font-size: 11.3px;
        line-height: 1.45;
        color: var(--ink-2);
        margin-top: 4px;
      }
      .meta {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .chip {
        font-size: 9.7px;
        color: var(--ink-2);
        border: 1px solid var(--line);
        border-radius: 99px;
        background: var(--paper-2);
        padding: 3px 7px;
      }
      .chip.acc {
        color: var(--accent-strong);
        background: var(--accent-wash);
        border-color: color-mix(in srgb, var(--accent) 30%, transparent);
      }
      .chip.warn {
        color: color-mix(in srgb, var(--yellow) 70%, var(--ink));
        border-color: color-mix(in srgb, var(--yellow) 55%, var(--line));
        background: color-mix(in srgb, var(--yellow) 14%, transparent);
      }
      .enter {
        margin-top: 12px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 7px 11px;
        border-radius: 9px;
        color: #fff;
        background: var(--accent);
        font-size: 11px;
        font-weight: 700;
      }
      .lane-head {
        position: absolute;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line-strong);
        background: var(--paper-2);
        border-radius: 10px;
        color: var(--ink);
        font-size: 10.5px;
        font-weight: 750;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        animation: rise 0.4s both;
      }
      .node.step {
        padding: 13px 14px;
      }
      .node.step h3 {
        font-size: 12.5px;
        line-height: 1.35;
      }
      .node.step .tag {
        font-size: 10.3px;
      }
      .kind {
        position: absolute;
        top: -9px;
        left: 10px;
        font: 700 8px var(--mono);
        letter-spacing: 0.08em;
        padding: 3px 7px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        background: var(--surface);
        color: var(--ink-3);
      }
      .step.start,
      .step.end {
        border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
      }
      .step.decision {
        border-color: color-mix(in srgb, var(--yellow) 60%, var(--line));
      }
      .step.state {
        border-style: dashed;
      }
      .schema-card {
        padding: 0;
        overflow: hidden;
      }
      .schema-card::after {
        display: none;
      }
      .schema-card .schema-head {
        padding: 11px 13px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--node-color) 13%, transparent);
        font: 700 11.5px var(--mono);
      }
      .schema-list {
        padding: 8px 13px 11px;
        display: grid;
        gap: 4px;
      }
      .schema-list div {
        font: 10px/1.35 var(--mono);
        color: var(--ink-2);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      #drawer {
        position: fixed;
        top: 66px;
        right: 0;
        bottom: 0;
        width: 420px;
        max-width: 94vw;
        z-index: 48;
        display: flex;
        flex-direction: column;
        background: var(--surface-bright);
        border-left: 1px solid var(--line);
        box-shadow: -14px 0 40px rgb(26 36 29/0.13);
        transform: translateX(103%);
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      #drawer.open {
        transform: none;
      }
      #drawer-head {
        padding: 22px 24px 16px;
        border-bottom: 1px solid var(--line);
      }
      #drawer-kicker {
        display: flex;
        gap: 7px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 8px;
        color: var(--accent-strong);
        font: 700 9.5px var(--mono);
        letter-spacing: 0.11em;
        text-transform: uppercase;
      }
      #drawer h2 {
        font: 680 20px/1.25 var(--display);
        letter-spacing: -0.02em;
        padding-right: 30px;
      }
      #drawer-body {
        padding: 18px 24px 42px;
        overflow: auto;
        font-size: 12.8px;
        line-height: 1.65;
        color: var(--ink-2);
      }
      #drawer-body p {
        margin-bottom: 12px;
      }
      #drawer-body h4 {
        margin: 18px 0 8px;
        color: var(--ink-3);
        font: 750 9.5px var(--mono);
        letter-spacing: 0.13em;
      }
      .rules {
        list-style: none;
        display: grid;
        gap: 7px;
      }
      .rules li {
        position: relative;
        padding: 9px 11px 9px 29px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--paper-2);
        color: var(--ink);
        font-size: 11.8px;
        line-height: 1.5;
      }
      .rules li::before {
        content: "";
        position: absolute;
        left: 12px;
        top: 14px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
      }
      .gap-panel {
        margin: 16px 0 4px;
        padding: 13px;
        border: 1px solid color-mix(in srgb, var(--yellow) 52%, var(--line));
        border-radius: 12px;
        background: color-mix(in srgb, var(--yellow) 11%, var(--surface));
      }
      #drawer-body .gap-panel h4 {
        margin: 0 0 9px;
        color: color-mix(in srgb, var(--yellow) 72%, var(--ink));
      }
      .gap-panel .rules li {
        background: color-mix(in srgb, var(--yellow) 8%, var(--surface));
      }
      .gap-panel .rules li::before {
        background: var(--yellow);
      }
      .drawer-action {
        width: 100%;
        margin-top: 16px;
        padding: 10px 13px;
        border: 1px solid var(--accent);
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        font-size: 11.5px;
        font-weight: 750;
        cursor: pointer;
      }
      .drawer-action:hover {
        background: var(--accent-strong);
      }
      .node.journey-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 10px 14px;
      }
      .node.journey-summary .head {
        min-width: 0;
      }
      .node.journey-summary .tag {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .node.journey-summary .enter {
        flex: 0 0 auto;
        margin-top: 0;
      }
      .source {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 14px;
        padding: 5px 8px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: var(--paper-2);
        font: 9.5px var(--mono);
        color: var(--ink-2);
      }
      #drawer-close {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--surface);
        color: var(--ink-2);
        cursor: pointer;
      }
      #drawer-close:hover {
        color: var(--ink);
        border-color: var(--line-strong);
      }
      #controls {
        position: fixed;
        left: 16px;
        bottom: 16px;
        z-index: 42;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .control {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--surface);
        color: var(--ink-2);
        box-shadow: var(--shadow);
        cursor: pointer;
      }
      .control:hover {
        color: var(--ink);
        border-color: var(--line-strong);
      }
      .control.on {
        color: var(--accent-strong);
        background: var(--accent-wash);
        border-color: var(--accent);
      }
      .control:disabled {
        opacity: 0.35;
        cursor: default;
      }
      #legend {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 41;
        display: flex;
        align-items: center;
        gap: 13px;
        padding: 9px 13px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--surface);
        box-shadow: var(--shadow);
        font-size: 10px;
        color: var(--ink-2);
      }
      .key {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .swatch {
        width: 10px;
        height: 10px;
        border: 1px solid var(--line-strong);
        border-radius: 3px;
      }
      .swatch.partial {
        background: linear-gradient(135deg, var(--surface) 50%, var(--yellow) 50%);
      }
      .swatch.planned {
        background: var(--planned-bg);
        border-style: dashed;
      }
      #hint {
        position: fixed;
        left: 50%;
        bottom: 20px;
        z-index: 41;
        transform: translateX(-50%);
        padding: 8px 16px;
        border: 1px solid var(--line);
        border-radius: 99px;
        background: var(--surface);

          `<div class="head"><div class="icon" style="width:44px;height:44px">${icon(plane.icon, 23)}</div><div><h3 style="font-size:19px">${esc(plane.name)}</h3><div class="tag" style="font-size:12px">${esc(plane.detail)}</div></div></div><div class="meta"><span class="chip acc">${statusText(plane.status)}</span><span class="chip">${esc(plane.source)}</span>${plane.status === "partial" ? '<span class="chip warn">open status gaps</span>' : ""}</div>`,
          0,
          "headcard",
        );
        registerDrawer(planeHead, `L2 · ${plane.name}`);
        plane.components.forEach((component, index) => {
          const id = `component-${index}`,
            column = index % columns,
            row = Math.floor(index / columns),
            node = { ...component, id, x: x0 + column * (cardW + gapX), y: 285 + row * (cardH + gapY), w: cardW, h: cardH, color: plane.color, icon: plane.icon };
          nodes += nodeHTML(
            node,
            `<div class="head"><div class="icon">${icon(plane.icon, 16)}</div><div><h3>${esc(component.name)}</h3></div></div><div class="tag" style="margin-top:10px">${esc(component.desc)}</div><div class="meta"><span class="chip acc">${component.rules.length} invariants</span><span class="chip">open details</span></div>`,
            60 + index * 45,
          );
          registerDrawer({ ...node, detail: component.desc, source: plane.source }, `L2 · ${plane.name}`);
        });
        return svgOpen(state.width, state.height) + "</svg>" + nodes;
      }
      function buildJourneys() {
        const entries = Object.entries(JOURNEYS),
          columns = 3,
          cardW = 420,
          cardH = 190,
          gapX = 40,
          gapY = 36,
          x0 = 75;
        state.width = columns * cardW + (columns - 1) * gapX + 150;
        state.height = 170 + Math.ceil(entries.length / columns) * (cardH + gapY) + 80;
        let nodes = nodeHTML(
          { id: "journey-head", x: x0, y: 30, w: state.width - 150, h: 92, color: COLORS.green, status: "context" },
          `<div class="head"><div class="icon">${icon("route")}</div><div><h3 style="font-size:18px">Seven journeys define the architecture under load and failure</h3><div class="tag">Open a swimlane to follow authority, persistence, external effects, retries, and terminal outcomes. Each path links the same repository boundaries from a different operational angle.</div></div></div>`,
          0,
          "headcard",
        );
        entries.forEach(([id, journey], index) => {
          const column = index % columns,
            row = Math.floor(index / columns),
            node = { ...journey, id, x: x0 + column * (cardW + gapX), y: 160 + row * (cardH + gapY), w: cardW, h: cardH };
          nodes += nodeHTML(
            node,
            `<div class="head"><div class="icon">${icon(journey.icon)}</div><div><h3>${esc(journey.name)}</h3><div class="tag">${esc(journey.tagline)}</div></div></div><div class="meta"><span class="chip acc">${journey.actors.length} lanes</span><span class="chip">${journey.steps.length} steps</span></div><div class="enter">Follow journey ${icon("play", 11)}</div>`,
            index * 50,
          );
          if (journey.status === "partial") registerDrawer(node, "L1 · ARCHITECTURE JOURNEY", { label: "Follow this journey", run: () => go({ type: "journey", id }) });
          else clickRegistry[id] = () => go({ type: "journey", id });
        });
        return svgOpen(state.width, state.height) + "</svg>" + nodes;
      }
      function buildJourney(id) {
        const journey = JOURNEYS[id],
          laneWidth = 330,
          nodeW = 270,
          nodeH = 94,
          rowHeight = 142,
          top = 170,
          laneX = (index) => 50 + index * laneWidth + (laneWidth - nodeW) / 2;
        const geometry = {};
        let maxRow = 0;
        journey.steps.forEach((step) => {
          maxRow = Math.max(maxRow, step.row);
          geometry[step.id] = { x: laneX(step.lane), y: top + step.row * rowHeight, w: nodeW, h: nodeH };
        });
        state.width = 100 + journey.actors.length * laneWidth;
        state.height = top + (maxRow + 1) * rowHeight + 80;
        let backgrounds = "";
        journey.actors.forEach((actor, index) => {
          backgrounds += `<rect class="lane-bg" x="${55 + index * laneWidth}" y="74" width="${laneWidth - 10}" height="${state.height - 130}" rx="15"/>`;
        });
        let edges = "";
        journey.steps.forEach((step, index) => {
          const next = step.next || journey.steps[index + 1]?.id;
          if (next) edges += edgeSVG(geometry[step.id], geometry[next], { flow: true, hot: true });
        });
        const summaryNode = {
          ...journey,
          id: "journey-summary",
          x: 55,
          y: 10,
          w: state.width - 110,
          h: 70,
          detail: journey.tagline,
          rules: ["Every lane boundary names the owner of the next accepted state.", "Partial status describes missing release proof or capability, not an ambiguous percentage."],
        };
        let nodes = nodeHTML(summaryNode, `<div class="head"><div class="icon">${icon(journey.icon, 16)}</div><div><h3>${esc(journey.name)}</h3><div class="tag">${esc(journey.tagline)}</div></div></div><div class="enter">Open journey status ${icon("play", 11)}</div>`, 0, "journey-summary");
        registerDrawer(summaryNode, `JOURNEY · ${journey.name}`);
        journey.actors.forEach((actor, index) => {
          nodes += `<div class="lane-head" style="left:${laneX(index)}px;top:92px;width:${nodeW}px">${esc(actor)}</div>`;
        });
        journey.steps.forEach((step, index) => {
          const g = geometry[step.id],
            node = { ...step, ...g, status: step.status || "built", color: journey.color, name: step.title, detail: step.sub, source: journey.source, rules: [`This step is owned by ${journey.actors[step.lane]}.`, `Its output is accepted only by the next explicit boundary in this journey.`] };
          const kindLabel = step.kind === "start" ? "START" : step.kind === "end" ? "OUTCOME" : step.decision ? "DECISION" : step.state ? "DURABLE STATE" : "";
          nodes += nodeHTML(node, `${kindLabel ? `<span class="kind">${kindLabel}</span>` : ""}<h3>${esc(step.title)}</h3><div class="tag">${esc(step.sub)}</div>`, index * 35, `step ${step.kind || ""} ${step.decision ? "decision" : ""} ${step.state ? "state" : ""}`);
          registerDrawer(node, `JOURNEY · ${journey.name} · ${journey.actors[step.lane]}`);
        });
        return svgOpen(state.width, state.height, backgrounds + edges) + "</svg>" + nodes;
      }
      function buildRuntime() {
        state.width = 1880;
        state.height = 1180;
        let backgrounds = "";
        RUNTIME_ZONES.forEach((zone) => {
          backgrounds += `<rect class="zone-bg" x="${zone.x}" y="${zone.y}" width="${zone.w}" height="${zone.h}" rx="16"/><text class="zone-label" x="${zone.x + 16}" y="${zone.y + 28}">${esc(zone.label)}</text>`;
        });
        const geometry = Object.fromEntries(RUNTIME_NODES.map((node) => [node.id, node]));
        let edges = "";
        RUNTIME_EDGES.forEach((edge) => {
          edges += edgeSVG(geometry[edge.a], geometry[edge.b], edge);
        });
        let nodes = "";
        RUNTIME_NODES.forEach((node, index) => {
          nodes += standardNode(node, index * 28);
          registerDrawer(node, "RUNTIME TOPOLOGY");
        });
        nodes += nodeHTML(
          { id: "data-entry", x: 800, y: 650, w: 295, h: 125, color: COLORS.green, status: "built" },
          `<div class="head"><div class="icon">${icon("db")}</div><div><h3>Postgres data model</h3><div class="tag">Seven durable domains and their release-blocking invariants</div></div></div><div class="enter">Open data atlas ${icon("play", 11)}</div>`,
          120,
        );
        clickRegistry["data-entry"] = () => go({ type: "data" });
        return svgOpen(state.width, state.height, backgrounds + edges) + "</svg>" + nodes;
      }
      function buildData() {
        const columns = 3,
          cardW = 390,
          gapX = 48,
          gapY = 52,
          x0 = 80,
          colY = [150, 150, 150],
          geometry = {};
        let nodes = "";
        state.width = columns * cardW + (columns - 1) * gapX + 160;
        nodes += nodeHTML(
          { id: "data-head", x: x0, y: 30, w: state.width - 160, h: 88, color: COLORS.green, status: "context" },
          `<div class="head"><div class="icon">${icon("db")}</div><div><h3 style="font-size:18px">Standard PostgreSQL is Chalk's durable authority</h3><div class="tag">This atlas groups the current migrations by invariant. It is descriptive, not a substitute for checked-in SQL.</div></div></div>`,
          0,
          "headcard",
        );
        DATA_GROUPS.forEach((group, index) => {
          const column = index % columns,
            height = 58 + group.tables.length * 18 + 26,
            node = { ...group, x: x0 + column * (cardW + gapX), y: colY[column], w: cardW, h: height };
          geometry[group.id] = node;
          colY[column] += height + gapY;
          nodes += nodeHTML(node, `<div class="schema-head">${esc(group.name)} · ${group.tables.length} tables</div><div class="schema-list">${group.tables.map((table) => `<div>${esc(table)}</div>`).join("")}</div>`, index * 45, "schema-card");
          registerDrawer(group, "DATA DOMAIN");
        });
        state.height = Math.max(...colY) + 50;
        let edges = "";
        DATA_EDGES.forEach((edge) => {
          edges += edgeSVG(geometry[edge.a], geometry[edge.b], { ...edge, dashed: true });
        });
        return svgOpen(state.width, state.height, edges) + "</svg>" + nodes;
      }

      function draw() {
        clickRegistry = {};
        let html;
        if (state.view.type === "system") html = buildSystem();
        else if (state.view.type === "planes") html = buildPlanes();
        else if (state.view.type === "plane") html = buildPlane(state.view.id);
        else if (state.view.type === "journeys") html = buildJourneys();
        else if (state.view.type === "journey") html = buildJourney(state.view.id);
        else if (state.view.type === "runtime") html = buildRuntime();
        else html = buildData();
        world.style.width = `${state.width}px`;
        world.style.height = `${state.height}px`;
        world.innerHTML = html;
        world.querySelectorAll(".node[data-node]").forEach((node) => {
          if (clickRegistry[node.dataset.node]) {
            node.setAttribute("role", "button");
            node.setAttribute("tabindex", "0");
          }
        });
        closeDrawer();
        renderChrome();
        fit();
      }
      function crumbPath() {
        const path = [{ label: "System", view: { type: "system" } }],
          view = state.view;
        if (view.type === "system") return path;
        if (view.type === "planes" || view.type === "plane") {
          path.push({ label: "Architecture planes", view: { type: "planes" } });
          if (view.type === "plane") path.push({ label: PLANES.find((p) => p.id === view.id).name, view });
          return path;
        }
        if (view.type === "journeys" || view.type === "journey") {
          path.push({ label: "Journeys", view: { type: "journeys" } });
          if (view.type === "journey") path.push({ label: JOURNEYS[view.id].name, view });
          return path;
        }
        path.push({ label: "Runtime", view: { type: "runtime" } });
        if (view.type === "data") path.push({ label: "Postgres data model", view });
        return path;
      }
      function renderChrome() {
        const path = crumbPath();
        $("#crumbs").innerHTML = path.map((item, index) => `${index ? '<span class="sep">/</span>' : ""}<button class="crumb${index === path.length - 1 ? " here" : ""}" ${index === path.length - 1 ? 'aria-current="page"' : ""}>${esc(item.label)}</button>`).join("");
        $("#crumbs")
          .querySelectorAll(".crumb")
          .forEach((button, index) => {
            if (index < path.length - 1) button.addEventListener("click", () => go(path[index].view));
          });
        const labels = { system: "L0 · SYSTEM", planes: "L1 · PLANES", plane: "L2 · PLANE", journeys: "L1 · JOURNEYS", journey: "L2 · JOURNEY", runtime: "L1 · RUNTIME", data: "L2 · DATA" };
        $("#level").textContent = labels[state.view.type];
        const root = state.view.type === "plane" ? "planes" : state.view.type === "journey" ? "journeys" : state.view.type === "data" ? "runtime" : state.view.type;
        $("#tabs")
          .querySelectorAll("button")
          .forEach((button) => button.classList.toggle("on", button.dataset.view === root));
        $("#up-button").disabled = !parentView(state.view);
        $("#hint").style.display = state.view.type === "system" ? "" : "none";
      }
      let drawerReturnFocus = null;
      function openDrawer({ kicker, title, body, action }) {
        const drawer = $("#drawer");
        if (!drawer.classList.contains("open")) drawerReturnFocus = document.activeElement;
        $("#drawer-kicker").textContent = kicker;
        $("#drawer-title").textContent = title;
        $("#drawer-body").innerHTML = `${body}${action ? `<button class="drawer-action" type="button">${esc(action.label)}</button>` : ""}`;
        if (action) $("#drawer-body .drawer-action").addEventListener("click", action.run);
        drawer.removeAttribute("inert");
        drawer.setAttribute("aria-hidden", "false");
        drawer.classList.add("open");
        requestAnimationFrame(() => $("#drawer-close").focus());
      }
      function closeDrawer() {
        const drawer = $("#drawer"),
          wasOpen = drawer.classList.contains("open");
        drawer.classList.remove("open");
        drawer.setAttribute("aria-hidden", "true");
        drawer.setAttribute("inert", "");
        if (wasOpen && drawerReturnFocus?.isConnected) drawerReturnFocus.focus();
        drawerReturnFocus = null;
      }
      function applyTransform() {
        viewport.style.transform = `translate(${state.x}px,${state.y}px) scale(${state.scale})`;
      }
      function fit() {
        const bounds = stage.getBoundingClientRect(),
          padding = 72;
        state.scale = Math.max(0.18, Math.min((bounds.width - padding) / state.width, (bounds.height - padding) / state.height, 1.05));
        state.x = (bounds.width - state.width * state.scale) / 2;
        state.y = (bounds.height - state.height * state.scale) / 2;
        applyTransform();
      }
      function zoomAt(next, clientX, clientY) {
        const bounds = stage.getBoundingClientRect(),
          px = clientX - bounds.left,
          py = clientY - bounds.top,
          old = state.scale;
        state.scale = Math.max(0.18, Math.min(2.5, next));
        state.x = px - (px - state.x) * (state.scale / old);
        state.y = py - (py - state.y) * (state.scale / old);
        applyTransform();
      }
      function zoomBy(direction) {
        const bounds = stage.getBoundingClientRect();
        zoomAt(state.scale * (direction > 0 ? 1.18 : 0.84), bounds.left + bounds.width / 2, bounds.top + bounds.height / 2);
      }

      let drag = null;
      stage.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".node,button,input,#drawer")) return;
        drag = { id: event.pointerId, x: event.clientX, y: event.clientY, originX: state.x, originY: state.y };
        stage.setPointerCapture(event.pointerId);
        stage.classList.add("dragging");
      });
      stage.addEventListener("pointermove", (event) => {
        if (!drag || event.pointerId !== drag.id) return;
        state.x = drag.originX + event.clientX - drag.x;
        state.y = drag.originY + event.clientY - drag.y;
        applyTransform();
      });
      stage.addEventListener("pointerup", (event) => {
        if (drag && event.pointerId === drag.id) {
          drag = null;
          stage.classList.remove("dragging");
        }
      });
      stage.addEventListener("pointercancel", () => {
        drag = null;
        stage.classList.remove("dragging");
      });
      stage.addEventListener(
        "wheel",
        (event) => {
          event.preventDefault();
          zoomAt(state.scale * Math.exp(-event.deltaY * WHEEL_ZOOM_SENSITIVITY), event.clientX, event.clientY);
        },
        { passive: false },
      );
      world.addEventListener("click", (event) => {
        const node = event.target.closest("[data-node]");
        if (node) clickRegistry[node.dataset.node]?.();
      });
      world.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") return;
        const node = event.target.closest("[data-node]");
        if (!node || !clickRegistry[node.dataset.node]) return;
        event.preventDefault();
        clickRegistry[node.dataset.node]();
      });

      $("#tabs")
        .querySelectorAll("button")
        .forEach((button) => button.addEventListener("click", () => go({ type: button.dataset.view })));
      $("#brand").addEventListener("click", () => go({ type: "system" }));
      $("#drawer-close").addEventListener("click", closeDrawer);
      $("#zoom-in").addEventListener("click", () => zoomBy(1));
      $("#zoom-out").addEventListener("click", () => zoomBy(-1));
      $("#zoom-fit").addEventListener("click", fit);
      $("#up-button").addEventListener("click", () => {
        const parent = parentView(state.view);
        if (parent) go(parent);
      });
      $("#tilt-button").addEventListener("click", () => {
        stage.classList.toggle("tilted");
        $("#tilt-button").classList.toggle("on", stage.classList.contains("tilted"));
      });
      function toggleTheme() {
        document.documentElement.classList.toggle("dark");
        localStorage.setItem("chalk-atlas-theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
      }
      if (localStorage.getItem("chalk-atlas-theme") === "dark") document.documentElement.classList.add("dark");
      $("#theme-button").prepend(document.createTextNode("◐ "));
      $("#theme-button").addEventListener("click", toggleTheme);

      const searchIndex = [
        ...PLANES.map((plane) => ({ label: plane.name, sub: plane.tagline, type: "PLANE", view: { type: "plane", id: plane.id } })),
        ...PLANES.flatMap((plane) => plane.components.map((component, index) => ({ label: component.name, sub: `${plane.name} · ${component.desc}`, type: "COMPONENT", view: { type: "plane", id: plane.id }, open: `component-${index}` }))),
        ...Object.entries(JOURNEYS).map(([id, journey]) => ({ label: journey.name, sub: journey.tagline, type: "JOURNEY", view: { type: "journey", id } })),
        ...RUNTIME_NODES.map((node) => ({ label: node.name, sub: node.tagline, type: "RUNTIME", view: { type: "runtime" }, open: node.id })),
        ...DATA_GROUPS.map((group) => ({ label: group.name, sub: group.tables.join(" · "), type: "DATA", view: { type: "data" }, open: group.id })),
        ...DATA_GROUPS.flatMap((group) => group.tables.map((table) => ({ label: table, sub: group.name, type: "TABLE", view: { type: "data" }, open: group.id }))),
      ];
      let selectedResult = 0,
        currentResults = [],
        searchReturnFocus = null;
      function showSearch() {
        const search = $("#search");
        if (!search.classList.contains("open")) searchReturnFocus = document.activeElement;
        search.setAttribute("aria-hidden", "false");
        search.classList.add("open");
        $("#search-input").value = "";
        selectedResult = 0;
        renderSearch();
        requestAnimationFrame(() => $("#search-input").focus());
      }
      function hideSearch() {
        const search = $("#search"),
          wasOpen = search.classList.contains("open");
        search.classList.remove("open");
        search.setAttribute("aria-hidden", "true");
        if (wasOpen && searchReturnFocus?.isConnected) searchReturnFocus.focus();
        searchReturnFocus = null;
      }
      function searchScore(item, query) {
        const label = item.label.toLowerCase(),
          type = item.type.toLowerCase(),
          sub = item.sub.toLowerCase();
        if (label === query) return 0;
        if (label.startsWith(query)) return 1;
        if (label.includes(query)) return 2;
        if (type.includes(query)) return 3;
        if (sub.includes(query)) return 4;
        return 99;
      }
      function renderSearch() {
        const query = $("#search-input").value.trim().toLowerCase();
        currentResults = searchIndex
          .filter((item) => !query || searchScore(item, query) < 99)
          .map((item, index) => ({ item, index, score: query ? searchScore(item, query) : 0 }))
          .sort((a, b) => a.score - b.score || a.index - b.index)
          .slice(0, 14)
          .map((result) => result.item);
        selectedResult = Math.min(selectedResult, Math.max(0, currentResults.length - 1));
        $("#search-results").innerHTML = currentResults.length
          ? currentResults
              .map(
                (item, index) =>
                  `<div class="result${index === selectedResult ? " selected" : ""}" data-result="${index}">${icon("search", 14)}<div><div class="result-title">${esc(item.label)}</div><div class="result-sub">${esc(item.sub)}</div></div><span class="result-type">${item.type}</span></div>`,
              )
              .join("")
          : '<div class="result"><div class="result-sub">No architecture matches.</div></div>';
        $("#search-results")
          .querySelectorAll("[data-result]")
          .forEach((element) => element.addEventListener("click", () => chooseResult(currentResults[Number(element.dataset.result)])));
      }
      function chooseResult(item) {
        if (!item) return;
        hideSearch();
        go(item.view, item.open);
      }
      $("#search-button").addEventListener("click", showSearch);
      $("#search-input").addEventListener("input", () => {
        selectedResult = 0;
        renderSearch();
      });
      $("#search-input").addEventListener("keydown", (event) => {
        if ((event.key === "ArrowDown" || event.key === "ArrowUp") && currentResults.length) {
          event.preventDefault();
          selectedResult = (selectedResult + (event.key === "ArrowDown" ? 1 : -1) + currentResults.length) % currentResults.length;
          renderSearch();
        }
        if (event.key === "Enter") chooseResult(currentResults[selectedResult]);
      });
      $("#search").addEventListener("click", (event) => {
        if (event.target === $("#search")) hideSearch();
      });
      $("#search").addEventListener("keydown", (event) => {
        if (event.key !== "Tab") return;
        event.preventDefault();
        $("#search-input").focus();
      });
      document.addEventListener("keydown", (event) => {
        const editing = ["INPUT", "TEXTAREA"].includes(document.activeElement?.tagName);
        if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") {
          event.preventDefault();
          showSearch();
          return;
        }
        if (event.key === "Escape") {
          if ($("#search").classList.contains("open")) hideSearch();
          else if ($("#drawer").classList.contains("open")) closeDrawer();
          else {
            const parent = parentView(state.view);
            if (parent) go(parent);
          }
          return;
        }
        if (editing) return;
        if (event.key.toLowerCase() === "f") fit();
        if (event.key.toLowerCase() === "t") $("#tilt-button").click();
        if (event.key.toLowerCase() === "d") toggleTheme();
        if (event.key === "+" || event.key === "=") zoomBy(1);
        if (event.key === "-") zoomBy(-1);
      });
      window.addEventListener("resize", fit);
      const partialEntities = [...PLANES, ...PLANES.flatMap((plane) => plane.components), ...SYSTEM_NODES, ...Object.values(JOURNEYS), ...Object.values(JOURNEYS).flatMap((journey) => journey.steps.map((step) => ({ ...step, name: step.title }))), ...RUNTIME_NODES].filter(
          (item) => item.status === "partial",
        ),
        missingPartialGaps = partialEntities.filter((item) => !partialGaps(item).length);
      if (missingPartialGaps.length) throw new Error(`Partial architecture items need explicit gaps: ${missingPartialGaps.map((item) => item.name).join(", ")}`);
      draw();
    </script>
  </body>
</html>
