<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chalk Lobby Animations</title>
    <style>
      :root {
        --green: #3e7a5a;
        --green-deep: #2c5a42;
        --cream: #f6f1e8;
        --ink: #2a2622;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          ui-sans-serif,
          -apple-system,
          "Segoe UI",
          sans-serif;
        min-height: 100vh;
        display: grid;
        place-content: center;
        gap: 32px;
        background: var(--cream);
        color: var(--ink);
        padding: 24px;
      }
      h1 {
        font-size: clamp(24px, 4vw, 36px);
        text-align: center;
      }
      h1 .dot {
        color: var(--green);
      }
      p.sub {
        text-align: center;
        color: #6c6154;
      }
      .cards {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }
      a.card {
        display: block;
        width: 280px;
        text-decoration: none;
        color: inherit;
        background: #fff;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 24px -10px rgba(60, 45, 25, 0.3);
        transition:
          transform 150ms ease,
          box-shadow 150ms ease;
      }
      a.card:hover {
        transform: translateY(-3px);
        box-shadow: 0 14px 30px -10px rgba(60, 45, 25, 0.35);
      }
      .preview {
        height: 150px;
        position: relative;
        background: #fdf8ee;
        overflow: hidden;
      }
      .preview .half {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 38%;
        background: repeating-linear-gradient(90deg, #1f3f2f 0 5px, #4c8264 11px, #1f3f2f 22px);
      }
      .preview .half.l {
        left: 0;
      }
      .preview .half.r {
        right: 0;
      }
      .preview.blinds {
        background: #fdf8ee;
      }
      .preview.blinds .slats {
        position: absolute;
        inset: 0 0 45% 0;
        background: repeating-linear-gradient(180deg, #e7dcc4 0 10px, #a99a78 10px 12px);
      }
      .preview.blinds .bar {
        position: absolute;
        left: 0;
        right: 0;
        top: 55%;
        height: 8px;
        background: var(--green-deep);
      }
      .label {
        padding: 16px 20px;
      }
      .label strong {
        display: block;
        font-size: 17px;
      }
      .label span {
        font-size: 13.5px;
        color: #6c6154;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>chalk<span class="dot">.</span> lobby animations</h1>
      <p class="sub">Pick a treatment — space bar or the button toggles enter / step out.</p>
    </div>
    <div class="cards">
      <a class="card" href="curtains.html">
        <div class="preview">
          <div class="half l"></div>
          <div class="half r"></div>
        </div>
        <div class="label">
          <strong>Curtains</strong>
          <span>Velvet panels draw apart with a cloth sway.</span>
        </div>
      </a>
      <a class="card" href="blinds.html">
        <div class="preview blinds">
          <div class="slats"></div>
          <div class="bar"></div>
        </div>
        <div class="label">
          <strong>Blinds</strong>
          <span>Slats tilt open, then the stack lifts to the headrail.</span>
        </div>
      </a>
    </div>
  </body>
</html>
