<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chalk Lobby — Blinds</title>
    <style>
      :root {
        --green: #3e7a5a;
        --green-deep: #2c5a42;
        --cream: #f6f1e8;
        --ink: #2a2622;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family:
          ui-sans-serif,
          -apple-system,
          "Segoe UI",
          sans-serif;
        background: #171512;
        color: var(--ink);
        overflow: hidden;
      }

      .stage {
        position: relative;
        height: 100%;
        overflow: hidden;
      }

      /* ---------- Lobby scene behind the blinds ---------- */
      .lobby {
        position: absolute;
        inset: 0;
        background: radial-gradient(120% 90% at 50% 0%, #fdf8ee 0%, var(--cream) 45%, #e9e0d0 100%);
      }
      .glow {
        position: absolute;
        top: 6%;
        left: 50%;
        width: 60vmin;
        height: 60vmin;
        transform: translateX(-50%);
        background: radial-gradient(circle, rgba(255, 240, 200, 0.8), transparent 65%);
      }
      .floor {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 26%;
        background: linear-gradient(180deg, #ddd0ba, #c7b79c);
      }
      .rug {
        position: absolute;
        left: 50%;
        bottom: 6%;
        width: 46%;
        height: 12%;
        transform: translateX(-50%);
        background: var(--green);
        border-radius: 50%;
        opacity: 0.5;
        filter: blur(1px);
      }
      .desk {
        position: absolute;
        left: 50%;
        bottom: 22%;
        width: 30%;
        height: 13%;
        transform: translateX(-50%);
        background: linear-gradient(180deg, #a9825e, #8f6b4a);
        border-radius: 10px 10px 4px 4px;
        box-shadow: 0 14px 24px -12px rgba(70, 50, 30, 0.5);
      }
      .sign {
        position: absolute;
        left: 50%;
        top: 16%;
        transform: translateX(-50%);
        font-weight: 800;
        font-size: clamp(22px, 4vmin, 40px);
        letter-spacing: 0.04em;
        color: var(--ink);
      }
      .sign .dot {
        color: var(--green);
      }
      .plant {
        position: absolute;
        bottom: 23%;
        width: 8vmin;
        height: 15vmin;
      }
      .plant.p1 {
        left: 12%;
      }
      .plant.p2 {
        right: 12%;
        transform: scaleX(-1);
      }
      .plant::before {
        content: "";
        position: absolute;
        inset: 0 0 32% 0;
        background: radial-gradient(circle at 40% 30%, #5c9273, var(--green-deep));
        border-radius: 55% 45% 40% 50%;
      }
      .plant::after {
        content: "";
        position: absolute;
        left: 20%;
        right: 20%;
        bottom: 0;
        height: 34%;
        background: linear-gradient(180deg, #bb9068, #a0784f);
        clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%);
        border-radius: 4px;
      }
      .welcome {
        position: absolute;
        left: 50%;
        top: 34%;
        width: 90%;
        transform: translate(-50%, 16px);
        text-align: center;
        opacity: 0;
        transition:
          opacity 900ms ease,
          transform 900ms ease;
      }
      body.open .welcome {
        opacity: 1;
        transform: translate(-50%, 0);
      }
      .welcome h1 {
        font-size: clamp(26px, 5vmin, 52px);
        font-weight: 750;
      }
      .welcome p {
        margin-top: 0.5em;
        font-size: clamp(14px, 2vmin, 19px);
        color: #6c6154;
      }

      .dimmer {
        position: absolute;
        inset: 0;
        background: #14110d;
        opacity: 0.5;
        transition: opacity 2000ms ease;
        pointer-events: none;
      }
      body.open .dimmer {
        opacity: 0;
      }

      /* ---------- Blinds ---------- */
      .blind {
        position: absolute;
        inset: 0;
        transform-origin: 50% 0;
      }
      .cord {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--green-deep);
        transform-origin: 50% 0;
        opacity: 0.85;
      }
      .cord.c1 {
        left: 20%;
      }
      .cord.c2 {
        right: 20%;
      }
      .slat {
        position: absolute;
        left: 0;
        right: 0;
        perspective: 900px;
        will-change: transform;
      }
      .face {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, #f7f0e1 0%, #e7dcc4 70%, #cfc2a5 100%);
        border-bottom: 1px solid rgba(90, 75, 50, 0.35);
        transform-origin: 50% 50%;
        backface-visibility: visible;
        will-change: transform;
      }
      .rail {
        position: absolute;
        left: 0;
        right: 0;
        height: 16px;
        background: linear-gradient(180deg, #4a8763, var(--green-deep));
        border-radius: 0 0 6px 6px;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
        will-change: transform;
      }
      .headrail {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 26px;
        background: linear-gradient(180deg, #4a4239, #262019);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.45);
        z-index: 5;
      }

      /* ---------- Controls ---------- */
      .controls {
        position: fixed;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%);
        z-index: 50;
      }
      .controls button {
        font: 600 15px/1 inherit;
        color: #fff;
        background: var(--green);
        border: 0;
        border-radius: 999px;
        padding: 13px 26px;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        transition: background 150ms ease;
      }
      .controls button:hover:not(:disabled) {
        background: var(--green-deep);
      }
      .controls button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .chip {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 50;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        color: var(--ink);
        background: rgba(246, 241, 232, 0.9);
        padding: 8px 14px;
        border-radius: 999px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);
      }
      .chip:hover {
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="lobby" aria-hidden="true">
        <div class="glow"></div>
        <div class="floor"></div>
        <div class="rug"></div>
        <div class="sign">chalk<span class="dot">.</span></div>
        <div class="desk"></div>
        <div class="plant p1"></div>
        <div class="plant p2"></div>
        <div class="welcome">
          <h1>Welcome to the lobby</h1>
          <p>Come on in — we saved you a seat.</p>
        </div>
      </div>
      <div class="dimmer"></div>
      <div class="blind" id="blind" aria-hidden="true">
        <div class="cord c1"></div>
        <div class="cord c2"></div>
      </div>
      <div class="headrail"></div>
    </div>

    <a class="chip" href="curtains.html">Curtains version →</a>
    <div class="controls">
      <button id="toggle" type="button">Enter the lobby</button>
    </div>

    <script>
      const blind = document.getElementById("blind");
      const btn = document.getElementById("toggle");
      const cords = blind.querySelectorAll(".cord");
      const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
      const speed = reduced ? 0.3 : 1;

      const SLATS = 16;
      const HEADRAIL = 26;
      const STACK_GAP = 7;
      const TILT_OPEN = "rotateX(66deg)";
      const TILT_CLOSED = "rotateX(0deg)";

      let slats = [],
        faces = [],
        rail,
        slatH;

      function build() {
        slats.forEach((s) => s.remove());
        if (rail) rail.remove();
        slats = [];
        faces = [];
        const drop = blind.clientHeight - HEADRAIL - 16;
        slatH = drop / SLATS;
        for (let i = 0; i < SLATS; i++) {
          const slat = document.createElement("div");
          slat.className = "slat";
          slat.style.top = HEADRAIL + i * slatH + "px";
          slat.style.height = slatH + 3 + "px";
          const face = document.createElement("div");
          face.className = "face";
          face.style.transform = TILT_CLOSED;
          slat.appendChild(face);
          blind.appendChild(slat);
          slats.push(slat);
          faces.push(face);
        }
        rail = document.createElement("div");
        rail.className = "rail";
        rail.style.top = HEADRAIL + SLATS * slatH + "px";
        blind.appendChild(rail);
        cords.forEach((c) => {
          c.style.transform = "scaleY(1)";
        });
      }

      // Animate transform to a target, then bake it into inline style.
      async function moveTo(el, target, duration, easing, delay = 0) {
        const anim = el.animate([{ transform: el.style.transform || "none" }, { transform: target }], { duration: duration * speed, delay: delay * speed, easing, fill: "forwards" });
        await anim.finished;
        el.style.transform = target;
        anim.cancel();
      }

      function tilt(open) {
        const target = open ? TILT_OPEN : TILT_CLOSED;
        // The tilt cord turns the slats in a ripple: top-first opening, bottom-first closing.
        return Promise.all(
          faces.map((face, i) => {
            const order = open ? i : SLATS - 1 - i;
            return moveTo(face, target, 750, "cubic-bezier(.4, 0, .3, 1)", order * 18);
          }),
        );
      }

      function lift(up) {
        const liftEase = "cubic-bezier(.55, .05, .3, 1)";
        const dropEase = "cubic-bezier(.4, .1, .55, 1)";
        const moves = slats.map((slat, i) => {
          const target = up ? `translateY(${i * (STACK_GAP - slatH)}px)` : "translateY(0px)";
          // Raising gathers from the bottom up; lowering settles from the top down.
          const delay = up ? (SLATS - 1 - i) * 14 : i * 10;
          return moveTo(slat, target, up ? 1700 : 1500, up ? liftEase : dropEase, delay);
        });
        const railTarget = up ? `translateY(${SLATS * (STACK_GAP - slatH)}px)` : "translateY(0px)";
        moves.push(moveTo(rail, railTarget, up ? 1700 : 1500, up ? liftEase : dropEase));
        const stackH = HEADRAIL + SLATS * STACK_GAP + 16;
        cords.forEach((c) => {
          moves.push(moveTo(c, up ? `scaleY(${stackH / blind.clientHeight})` : "scaleY(1)", up ? 1700 : 1500, up ? liftEase : dropEase));
        });
        return Promise.all(moves);
      }

      function settle() {
        // A light pendulum wobble once the stack reaches the headrail.
        return blind.animate({ transform: ["rotate(0deg)", "rotate(.4deg)", "rotate(-.25deg)", "rotate(.1deg)", "rotate(0deg)"] }, { duration: 900 * speed, easing: "ease-in-out" }).finished;
      }

      let busy = false;
      async function toggle() {
        if (busy) return;
        busy = true;
        btn.disabled = true;
        const opening = !document.body.classList.contains("open");
        document.body.classList.toggle("open", opening);
        if (opening) {
          await tilt(true);
          await lift(true);
          await settle();
        } else {
          await lift(false);
          await tilt(false);
        }
        btn.textContent = opening ? "Step out of the room" : "Enter the lobby";
        btn.disabled = false;
        busy = false;
      }

      btn.addEventListener("click", toggle);
      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          toggle();
        }
      });
      window.addEventListener("resize", () => {
        if (busy) return;
        const wasOpen = document.body.classList.contains("open");
        document.body.classList.remove("open");
        build();
        btn.textContent = "Enter the lobby";
        if (wasOpen) toggle();
      });

      build();
    </script>
  </body>
</html>
